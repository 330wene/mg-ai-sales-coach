<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精准学 · MG7 学习详情</title>
<style>
  :root {
    --blue: #1677FF;
    --text: #1c1c1e;
    --t2: #3a3a3c;
    --t3: #8e8e93;
    --line: #e5e5ea;
    --card-bg: #f7f8fa;
    --page-bg: #f5f6f8;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #e4e6ea;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px 48px;
  }


  /* ── Phone shell ── */
  .device {
    width: 375px;
    height: 780px;
    background: var(--page-bg);
    border-radius: 30px;
    overflow: hidden;
    box-shadow:
      0 0 0 0.5px rgba(0,0,0,0.06),
      0 12px 40px rgba(0,0,0,0.08),
      0 4px 12px rgba(0,0,0,0.04);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── Status bar ── */
  .sb {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 26px 5px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex-shrink: 0;
    background: var(--page-bg);
  }
  .sb-icons { display: flex; gap: 6px; align-items: center; }

  /* ── Nav ── */
  .nav {
    display: flex;
    align-items: center;
    padding: 2px 14px 10px;
    gap: 6px;
    flex-shrink: 0;
    background: var(--page-bg);
  }
  .nav .back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
  }
  .nav .title {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  /* ── Scroll area ── */
  .scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 20px;
    display: flex;
    flex-direction: column;
  }
  .scroll::-webkit-scrollbar { display: none; }

  /* ── 1分钟概要解读 ── */
  .summary-card {
    background: var(--white);
    border-radius: 14px;
    padding: 18px 16px;
    margin-bottom: 14px;
  }
  .summary-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .summary-icon {
    width: 22px;
    height: 22px;
    background: #FFF7E6;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .summary-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .summary-badge {
    font-size: 11px;
    color: #FA8C16;
    background: #FFF7E6;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .summary-points {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .summary-point {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--t2);
  }
  .summary-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--blue);
    flex-shrink: 0;
    margin-top: 7px;
  }

  /* ── 课件 PDF ── */
  .section-card {
    background: var(--white);
    border-radius: 14px;
    padding: 18px 16px;
    margin-bottom: 14px;
  }
  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
  }
  .pdf-embed {
    width: 100%;
    height: 420px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fafafa;
  }

  /* ── 视频 ── */
  .video-wrapper {
    width: 100%;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    background: #1a1a2e;
    aspect-ratio: 16 / 9;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .video-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: #fff;
  }
  .play-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.3);
    transition: background 0.15s;
  }
  .play-btn:hover {
    background: rgba(255,255,255,0.28);
  }
  .video-label {
    font-size: 13px;
    font-weight: 500;
    opacity: 0.85;
  }
  .video-duration {
    font-size: 12px;
    color: var(--blue);
    background: rgba(22,119,255,0.1);
    padding: 2px 10px;
    border-radius: 10px;
    font-weight: 500;
  }

  /* ── 底部按钮 ── */
  .btn-solid {
    display: block;
    width: 100%;
    padding: 14px 0;
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    background: #0A2463;
    border: none;
    border-radius: 12px;
    letter-spacing: 0.4px;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s;
  }
  .btn-solid:active {
    opacity: 0.85;
  }

  /* ── Home indicator ── */
  .home {
    width: 134px; height: 4px;
    background: var(--text);
    border-radius: 100px;
    flex-shrink: 0;
    opacity: 0.14;
    margin: 6px auto 10px;
  }

  /* ── 底部安全区 ── */
  .bottom-bar {
    padding: 0 16px 20px;
    flex-shrink: 0;
    background: var(--page-bg);
  }

  /* ── 星星奖励弹层 ── */
  .reward-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .reward-toast {
    background: #fff;
    border-radius: 20px;
    padding: 32px 28px 24px;
    text-align: center;
    max-width: 280px;
    width: 90%;
    box-shadow: 0 20px 48px rgba(0,0,0,0.18);
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .reward-star {
    font-size: 56px;
    animation: starBounce 0.6s ease infinite alternate;
    display: inline-block;
  }
  @keyframes starBounce {
    from { transform: scale(1) rotate(-5deg); }
    to   { transform: scale(1.15) rotate(5deg); }
  }

  .reward-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin: 12px 0 4px;
  }
  .reward-sub {
    font-size: 14px;
    color: var(--t3);
    margin-bottom: 6px;
  }
  .reward-stats {
    font-size: 12px;
    color: var(--t3);
    background: var(--card-bg);
    border-radius: 8px;
    padding: 8px 12px;
    margin: 12px 0 4px;
    line-height: 1.6;
  }
  .reward-stats span {
    color: var(--t2);
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="device">

  <!-- 状态栏 -->
  <div class="sb">
    <span>9:41</span>
    <span class="sb-icons">
      <svg width="15" height="10" viewBox="0 0 15 10"><rect x="0" y="5" width="2" height="5" rx="0.5" fill="#1c1c1e"/><rect x="3.5" y="3" width="2" height="7" rx="0.5" fill="#1c1c1e"/><rect x="7" y="1" width="2" height="9" rx="0.5" fill="#1c1c1e"/><rect x="10.5" y="0" width="2" height="10" rx="0.5" fill="#1c1c1e"/></svg>
      <svg width="15" height="11" viewBox="0 0 15 11"><rect x="0" y="0" width="13" height="11" rx="2.5" fill="none" stroke="#1c1c1e" stroke-width="1"/><rect x="1.5" y="1.5" width="3" height="8" rx="0.5" fill="#1c1c1e"/><rect x="5.5" y="1.5" width="3" height="8" rx="0.5" fill="#1c1c1e"/><rect x="9.5" y="1.5" width="3" height="8" rx="0.5" fill="#1c1c1e"/><rect x="13.5" y="3" width="1.8" height="5" rx="0.9" fill="#1c1c1e" opacity="0.25"/></svg>
    </span>
  </div>

  <!-- 导航 -->
  <div class="nav">
    <button class="back-btn" onclick="history.back()">
      <svg width="9" height="16" viewBox="0 0 9 16"><path d="M7.5 1L1 8l6.5 7" stroke="#007AFF" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="title">MG7 新品上市培训</span>
  </div>

  <!-- 滚动区 -->
  <div class="scroll">

    <!-- 1分钟概要解读 -->
    <div class="summary-card">
      <div class="summary-header">
        <span class="summary-icon">⚡</span>
        <span class="summary-label">1 分钟概要解读</span>
        <span class="summary-badge">约 1 分钟</span>
      </div>
      <div class="summary-points">
        <div class="summary-point">
          <span class="summary-dot"></span>
          <span>半固态电池版 CLTC 续航 537km，日常通勤一周一充，长途无焦虑</span>
        </div>
        <div class="summary-point">
          <span class="summary-dot"></span>
          <span>XDS 弯道动态控制同级独有，过弯极限提升 12%，驾控感受远超同级</span>
        </div>
        <div class="summary-point">
          <span class="summary-dot"></span>
          <span>后排纯平地板 + 540° 影像，接「给家里人开」的客户用得上</span>
        </div>
      </div>
    </div>

    <!-- 课件 PDF -->
    <div class="section-card">
      <div class="section-title">课件</div>
      <embed class="pdf-embed" src="assets/课件：MG7 25款上市培训.pdf#toolbar=0&navpanes=0" type="application/pdf">
    </div>

    <!-- 视频 -->
    <div class="section-card">
      <div class="section-title">视频讲解</div>
      <div class="video-wrapper">
        <div class="video-placeholder">
          <div class="play-btn">
            <svg width="18" height="20" viewBox="0 0 18 20"><path d="M0 0l18 10L0 20z" fill="#fff"/></svg>
          </div>
          <span class="video-label">MG7 核心卖点解析</span>
        </div>
      </div>
    </div>

  </div>

  <!-- 底部按钮 -->
  <div class="bottom-bar">
    <button class="btn-solid" id="doneBtn">我学完了</button>
  </div>

  <!-- Home indicator -->
  <div class="home"></div>

</div>

<script>
  // ── 阅读统计 ──
  const pageEnterTime = Date.now();
  let maxScroll = 0;

  const scrollEl = document.querySelector('.scroll');
  scrollEl.addEventListener('scroll', () => {
    const scrolled = scrollEl.scrollTop + scrollEl.clientHeight;
    const total = scrollEl.scrollHeight;
    const pct = Math.round((scrolled / total) * 100);
    if (pct > maxScroll) maxScroll = pct;
  });

  function formatTime(ms) {
    const totalSec = Math.floor(ms / 1000);
    const min = Math.floor(totalSec / 60);
    const sec = totalSec % 60;
    if (min > 0) return min + ' 分 ' + sec + ' 秒';
    return sec + ' 秒';
  }

  // ── 我学完了 ──
  document.getElementById('doneBtn').addEventListener('click', () => {
    const readDuration = Date.now() - pageEnterTime;

    // 构建奖励弹层
    const overlay = document.createElement('div');
    overlay.className = 'reward-overlay';
    overlay.innerHTML = `
      <div class="reward-toast">
        <div class="reward-star">⭐</div>
        <div class="reward-text">+1 颗星星</div>
        <div class="reward-sub">学习奖励已到账</div>
        <div class="reward-stats">
          阅读时长 <span>${formatTime(readDuration)}</span> · 阅读进度 <span>${maxScroll}%</span>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    // 点击任意位置关闭并返回首页
    overlay.addEventListener('click', () => {
      window.location.href = '成交教练-phase1-v2.html';
    });

    // 2.5 秒后自动返回首页
    setTimeout(() => {
      window.location.href = '成交教练-phase1-v2.html';
    }, 2500);
  });
</script>
</body>
</html>
