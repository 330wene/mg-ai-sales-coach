<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精准学 · 学习详情</title>
<style>
  :root {
    --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: #e4e6ea;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px 48px;
  }

  /* ── Container ── */
  .device {
    width: 412px;
    background: #EFF3FA;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 12px 36px rgba(20,50,100,0.2);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── Header (深蓝渐变) ── */
  .header {
    display: flex;
    align-items: center;
    padding: 16px;
    background: linear-gradient(168deg, #3E68DD 0%, #274FB2 60%, #1B3380 100%);
    flex-shrink: 0;
    gap: 8px;
  }
  .header-back {
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    flex-shrink: 0;
  }
  .header-back:active { opacity: 0.7; }
  .header-title {
    font-size: 16px;
    font-weight: 500;
    color: #fff;
    line-height: 1.3;
    flex: 1;
  }

  /* ── Content ── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
  }
  .content::-webkit-scrollbar { display: none; }

  /* ── White card (18px round + double shadow) ── */
  .card {
    background: #fff;
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: 0 1px 2px rgba(20,40,90,0.05), 0 10px 26px rgba(30,58,140,0.07);
  }

  .card-title {
    font-size: 16px;
    font-weight: 500;
    color: #1A2742;
    margin-bottom: 13px;
  }

  /* ── PDF embed ── */
  .pdf-embed {
    width: 100%;
    height: 420px;
    border: 1px solid #EAEEF4;
    border-radius: 10px;
    background: #fafafa;
  }

  /* ── Video ── */
  .video-wrap {
    width: 100%;
    border-radius: 10px;
    overflow: hidden;
    background: #1a1a2e;
    aspect-ratio: 16 / 9;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .video-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: #fff;
  }
  .video-play {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid rgba(255,255,255,0.3);
    cursor: pointer;
  }
  .video-label {
    font-size: 13px;
    font-weight: 500;
    opacity: 0.85;
  }

  /* ── Collapsible card ── */
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .card-header:active { opacity: 0.7; }
  .card-chevron {
    flex-shrink: 0;
    transition: transform 0.25s ease;
  }
  .card-chevron.open {
    transform: rotate(180deg);
  }
  .card-body {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s ease;
  }
  .card-body.open {
    max-height: 480px;
  }

  /* ── Primary button ── */
  .btn-primary {
    display: block;
    width: 100%;
    padding: 15px 0;
    text-align: center;
    font-size: 16px;
    font-weight: 500;
    color: #fff;
    background: linear-gradient(135deg, #5BA0F5, #2E6FE0);
    border: none;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(46,111,224,0.32);
    cursor: pointer;
    font-family: var(--font);
    margin-top: auto;
    transition: transform 0.12s;
  }
  .btn-primary:active {
    transform: scale(0.985);
  }

  /* ── Home indicator ── */
  .home-indicator {
    width: 134px;
    height: 4px;
    background: #1A2742;
    border-radius: 100px;
    flex-shrink: 0;
    opacity: 0.14;
    margin: 8px auto 10px;
  }

  /* ── Reward overlay ── */
  .reward-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .reward-toast {
    background: #fff;
    border-radius: 20px;
    padding: 32px 28px 24px;
    text-align: center;
    max-width: 280px;
    width: 90%;
    box-shadow: 0 20px 48px rgba(0,0,0,0.18);
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .reward-star {
    font-size: 56px;
    animation: starBounce 0.6s ease infinite alternate;
    display: inline-block;
  }
  @keyframes starBounce {
    from { transform: scale(1) rotate(-5deg); }
    to   { transform: scale(1.15) rotate(5deg); }
  }

  .reward-text {
    font-size: 18px;
    font-weight: 700;
    color: #1A2742;
    margin: 12px 0 4px;
  }
  .reward-sub {
    font-size: 14px;
    color: #8e8e93;
    margin-bottom: 6px;
  }
  .reward-stats {
    font-size: 12px;
    color: #8e8e93;
    background: #F3F6FA;
    border-radius: 8px;
    padding: 8px 12px;
    margin: 12px 0 4px;
    line-height: 1.6;
  }
  .reward-stats span {
    color: #5A6680;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="device">

  <!-- Header -->
  <div class="header">
    <button class="header-back" onclick="history.back()">
      <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12.5 4L7 10l5.5 6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="header-title">MG4 续航讲解要点</span>
  </div>

  <!-- Content -->
  <div class="content" id="scrollArea">

    <!-- MG7 核心卖点解析 -->
    <div class="card">
      <div class="card-title">MG4 续航卖点详解</div>
      <div class="video-wrap">
        <div class="video-inner">
          <div class="video-play">
            <svg width="18" height="20" viewBox="0 0 18 20"><path d="M0 0l18 10L0 20z" fill="#fff"/></svg>
          </div>
          <span class="video-label">4分钟</span>
        </div>
      </div>
    </div>

    <!-- 课件文档（可折叠） -->
    <div class="card">
      <div class="card-header" onclick="toggleCollapse(this)">
        <span class="card-title" style="margin-bottom:0">MG4 续航标准应答手册</span>
        <svg class="card-chevron" width="15" height="15" viewBox="0 0 15 15"><path d="M3 5.5L7.5 10 12 5.5" stroke="#C2CAD8" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="card-body">
        <embed class="pdf-embed" style="margin-top:13px" src="assets/课件：MG7 25款上市培训.pdf#toolbar=0&navpanes=0" type="application/pdf">
      </div>
    </div>

    <!-- Button -->
    <button class="btn-primary" id="doneBtn">我学完了</button>

  </div>

  <!-- Home indicator -->
  <div class="home-indicator"></div>

</div>

<script>
  // ── 折叠 ──
  function toggleCollapse(header) {
    var body = header.nextElementSibling;
    var chevron = header.querySelector('.card-chevron');
    body.classList.toggle('open');
    chevron.classList.toggle('open');
  }

  // ── 阅读统计 ──
  const pageEnterTime = Date.now();
  let maxScroll = 0;

  const scrollEl = document.getElementById('scrollArea');
  scrollEl.addEventListener('scroll', () => {
    const scrolled = scrollEl.scrollTop + scrollEl.clientHeight;
    const total = scrollEl.scrollHeight;
    const pct = Math.round((scrolled / total) * 100);
    if (pct > maxScroll) maxScroll = pct;
  });

  function formatTime(ms) {
    const totalSec = Math.floor(ms / 1000);
    const min = Math.floor(totalSec / 60);
    const sec = totalSec % 60;
    if (min > 0) return min + ' 分 ' + sec + ' 秒';
    return sec + ' 秒';
  }

  // ── 我学完了 ──
  document.getElementById('doneBtn').addEventListener('click', () => {
    const readDuration = Date.now() - pageEnterTime;

    const overlay = document.createElement('div');
    overlay.className = 'reward-overlay';
    overlay.innerHTML = `
      <div class="reward-toast">
        <div class="reward-star">⭐</div>
        <div class="reward-text">+1 颗星星</div>
        <div class="reward-sub">学习奖励已到账</div>
        <div class="reward-stats">
          阅读时长 <span>${formatTime(readDuration)}</span> · 阅读进度 <span>${maxScroll}%</span>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    overlay.addEventListener('click', () => {
      window.location.href = '成交教练-phase1-v2.html';
    });

    setTimeout(() => {
      window.location.href = '成交教练-phase1-v2.html';
    }, 2500);
  });
</script>
</body>
</html>
