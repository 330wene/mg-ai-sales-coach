<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精准学 · 学习详情</title>
<style>
  :root {
    --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: #e4e6ea;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px 48px;
  }

  /* ── Container ── */
  .device {
    width: 412px;
    background: #EFF3FA;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 12px 36px rgba(20,50,100,0.2);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── Header (深蓝渐变) ── */
  .header {
    display: flex;
    align-items: center;
    padding: 16px;
    background: linear-gradient(168deg, #3E68DD 0%, #274FB2 60%, #1B3380 100%);
    flex-shrink: 0;
    gap: 8px;
  }
  .header-back {
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    flex-shrink: 0;
  }
  .header-back:active { opacity: 0.7; }
  .header-title {
    font-size: 16px;
    font-weight: 500;
    color: #fff;
    line-height: 1.3;
    flex: 1;
  }

  /* ── Content ── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
  }
  .content::-webkit-scrollbar { display: none; }

  /* ── White card (18px round + double shadow) ── */
  .card {
    background: #fff;
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: 0 1px 2px rgba(20,40,90,0.05), 0 10px 26px rgba(30,58,140,0.07);
  }

  .card-title {
    font-size: 16px;
    font-weight: 500;
    color: #1A2742;
    margin-bottom: 13px;
  }

  /* ── Gold bolt badge ── */
  .summary-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .gold-badge {
    width: 30px;
    height: 30px;
    border-radius: 9px;
    background: linear-gradient(135deg, #FFE0A3, #F5B945);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .summary-label {
    font-size: 16px;
    font-weight: 500;
    color: #1A2742;
  }
  .summary-text {
    font-size: 14px;
    line-height: 1.7;
    color: #5A6680;
  }

  /* ── Thumbnail ── */
  .thumb {
    border-radius: 12px;
    border: 1px solid #EAEEF4;
    overflow: hidden;
  }
  .thumb-cover {
    height: 120px;
    background: linear-gradient(135deg, #3C5A4E, #22382F);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .thumb-cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 70% 30%, rgba(255,255,255,0.12), transparent 60%);
  }
  .thumb-cover-title {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    position: relative;
    z-index: 1;
  }
  .thumb-cover-date {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    position: relative;
    z-index: 1;
  }
  .thumb-body {
    background: #fff;
    padding: 12px 13px;
  }
  .thumb-bar {
    height: 8px;
    background: #EDF0F5;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .thumb-bar.w70 { width: 70%; }
  .thumb-bar.w90 { width: 90%; }
  .thumb-blocks {
    display: flex;
    gap: 8px;
  }
  .thumb-block {
    flex: 1;
    height: 34px;
    background: #F3F6FA;
    border-radius: 6px;
  }
  .thumb-hint {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    margin-top: 12px;
    font-size: 13px;
    color: #7486A6;
  }

  /* ── Primary button ── */
  .btn-primary {
    display: block;
    width: 100%;
    padding: 15px 0;
    text-align: center;
    font-size: 16px;
    font-weight: 500;
    color: #fff;
    background: linear-gradient(135deg, #5BA0F5, #2E6FE0);
    border: none;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(46,111,224,0.32);
    cursor: pointer;
    font-family: var(--font);
    margin-top: auto;
    transition: transform 0.12s;
  }
  .btn-primary:active {
    transform: scale(0.985);
  }

  /* ── Home indicator ── */
  .home-indicator {
    width: 134px;
    height: 4px;
    background: #1A2742;
    border-radius: 100px;
    flex-shrink: 0;
    opacity: 0.14;
    margin: 8px auto 10px;
  }

  /* ── Reward overlay ── */
  .reward-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .reward-toast {
    background: #fff;
    border-radius: 20px;
    padding: 32px 28px 24px;
    text-align: center;
    max-width: 280px;
    width: 90%;
    box-shadow: 0 20px 48px rgba(0,0,0,0.18);
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .reward-star {
    font-size: 56px;
    animation: starBounce 0.6s ease infinite alternate;
    display: inline-block;
  }
  @keyframes starBounce {
    from { transform: scale(1) rotate(-5deg); }
    to   { transform: scale(1.15) rotate(5deg); }
  }

  .reward-text {
    font-size: 18px;
    font-weight: 700;
    color: #1A2742;
    margin: 12px 0 4px;
  }
  .reward-sub {
    font-size: 14px;
    color: #8e8e93;
    margin-bottom: 6px;
  }
  .reward-stats {
    font-size: 12px;
    color: #8e8e93;
    background: #F3F6FA;
    border-radius: 8px;
    padding: 8px 12px;
    margin: 12px 0 4px;
    line-height: 1.6;
  }
  .reward-stats span {
    color: #5A6680;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="device">

  <!-- Header -->
  <div class="header">
    <button class="header-back" onclick="history.back()">
      <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12.5 4L7 10l5.5 6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="header-title">车辆续航里程官方标准答复话术</span>
  </div>

  <!-- Content -->
  <div class="content" id="scrollArea">

    <!-- Card ①: 1 分钟重点提炼 -->
    <div class="card">
      <div class="summary-head">
        <div class="gold-badge">
          <svg width="17" height="17" viewBox="0 0 17 17"><path d="M9.5 1.5L4 9h4l-1.5 6.5L13 8H9l.5-6.5z" fill="#fff"/></svg>
        </div>
        <span class="summary-label">1 分钟重点提炼</span>
      </div>
      <div class="summary-text">官方标准话术模板，涵盖 CLTC 续航定义、电池容量换算、同价位对比核心数据，直接用于客户答疑。</div>
    </div>

    <!-- Card ②: 课件文档 -->
    <div class="card">
      <div class="card-title">课件文档</div>
      <div class="thumb">
        <div class="thumb-cover">
          <div class="thumb-cover-title">MG7 2025款培训</div>
          <div class="thumb-cover-date">2024.11</div>
        </div>
        <div class="thumb-body">
          <div class="thumb-bar w70"></div>
          <div class="thumb-bar w90"></div>
          <div class="thumb-blocks">
            <div class="thumb-block"></div>
            <div class="thumb-block"></div>
            <div class="thumb-block"></div>
          </div>
        </div>
      </div>
      <div class="thumb-hint">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M8 1H3.5A1.5 1.5 0 002 2.5v9A1.5 1.5 0 003.5 13h7a1.5 1.5 0 001.5-1.5V5L8 1z" stroke="#7486A6" stroke-width="1.2" fill="none"/><path d="M8 1v4h4" stroke="#7486A6" stroke-width="1.2" fill="none"/><line x1="5" y1="8" x2="9" y2="8" stroke="#7486A6" stroke-width="0.8" stroke-linecap="round"/><line x1="5" y1="10" x2="8" y2="10" stroke="#7486A6" stroke-width="0.8" stroke-linecap="round"/></svg>
        <span>共 12 页 · 点击查看完整课件</span>
      </div>
    </div>

    <!-- Button -->
    <button class="btn-primary" id="doneBtn">我学完了</button>

  </div>

  <!-- Home indicator -->
  <div class="home-indicator"></div>

</div>

<script>
  // ── 阅读统计 ──
  const pageEnterTime = Date.now();
  let maxScroll = 0;

  const scrollEl = document.getElementById('scrollArea');
  scrollEl.addEventListener('scroll', () => {
    const scrolled = scrollEl.scrollTop + scrollEl.clientHeight;
    const total = scrollEl.scrollHeight;
    const pct = Math.round((scrolled / total) * 100);
    if (pct > maxScroll) maxScroll = pct;
  });

  function formatTime(ms) {
    const totalSec = Math.floor(ms / 1000);
    const min = Math.floor(totalSec / 60);
    const sec = totalSec % 60;
    if (min > 0) return min + ' 分 ' + sec + ' 秒';
    return sec + ' 秒';
  }

  // ── 我学完了 ──
  document.getElementById('doneBtn').addEventListener('click', () => {
    const readDuration = Date.now() - pageEnterTime;

    const overlay = document.createElement('div');
    overlay.className = 'reward-overlay';
    overlay.innerHTML = `
      <div class="reward-toast">
        <div class="reward-star">⭐</div>
        <div class="reward-text">+1 颗星星</div>
        <div class="reward-sub">学习奖励已到账</div>
        <div class="reward-stats">
          阅读时长 <span>${formatTime(readDuration)}</span> · 阅读进度 <span>${maxScroll}%</span>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    overlay.addEventListener('click', () => {
      window.location.href = '成交教练-phase1-v2.html';
    });

    setTimeout(() => {
      window.location.href = '成交教练-phase1-v2.html';
    }, 2500);
  });
</script>
</body>
</html>
