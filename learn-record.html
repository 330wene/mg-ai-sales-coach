<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>学习记录</title>
  <style>
    :root {
      --navy-950: #071327;
      --navy-900: #0b234a;
      --ink: #1e293b;
      --text: #334155;
      --muted: #94a3b8;
      --line: #e2e8f0;
      --page: #F2F6FC;
      --card: #fff;
      --card-border: #dde4f0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.035), 0 2px 8px rgba(0,0,0,.025);
      --shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 14px rgba(0,0,0,.04);
      --shadow-lg: 0 24px 64px rgba(20,32,52,.2);
      --radius: 10px;
      --radius-lg: 14px;
      --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%; background: #dfe4ec;
      font-family: var(--font); color: var(--ink);
      -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
    }

    .stage { min-height: 100vh; display: grid; place-items: center; padding: 18px; }
    .phone {
      position: relative; width: min(390px, 100vw); height: min(844px, calc(100vh - 36px));
      min-height: 700px; overflow: hidden; background: var(--page);
      border: 1px solid #cfd6e1; border-radius: 28px; box-shadow: var(--shadow-lg);
      display: flex; flex-direction: column;
    }
    .scroll { flex: 1; overflow-y: auto; overscroll-behavior: contain; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .scroll::-webkit-scrollbar { display: none; }

    /* Header */
    .header {
      background: linear-gradient(160deg, #08172b 0%, #0f2342 50%, #132f58 100%);
      padding: 18px 16px 16px;
      flex-shrink: 0;
    }
    .nav-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .back-btn {
      width: auto; padding: 6px 14px; font-size: 14px; font-weight: 500;
      color: rgba(255,255,255,.75); background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12); border-radius: 20px;
      cursor: pointer; transition: background 0.15s;
    }
    .back-btn:active { background: rgba(255,255,255,.14); color: #fff; }
    .nav-title { font-size: 16px; font-weight: 600; color: #fff; }

    /* Week summary */
    .week-summary { padding: 12px 16px 0; }
    .summary-row {
      display: flex; align-items: baseline; gap: 6px;
    }
    .summary-label { font-size: 13px; color: rgba(255,255,255,.65); }
    .summary-value { font-size: 22px; font-weight: 700; color: #fff; }
    .summary-unit { font-size: 13px; color: rgba(255,255,255,.55); }
    .summary-avg { font-size: 12px; color: rgba(255,255,255,.45); margin-top: 4px; padding-bottom: 4px; }

    /* Content */
    .content { padding: 16px; }

    /* Day group */
    .day-group { margin-bottom: 16px; }
    .day-header {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 0 2px 8px;
    }
    .day-date { font-size: 14px; font-weight: 600; color: var(--ink); }
    .day-duration { font-size: 12px; color: var(--muted); }

    /* Log item */
    .log-item {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: var(--radius-lg); padding: 14px 16px;
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center; gap: 12px;
    }
    .log-item + .log-item { margin-top: 8px; }
    .log-info { flex: 1; min-width: 0; }
    .log-title { font-size: 14px; font-weight: 500; color: var(--ink); line-height: 1.4; }
    .log-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .log-duration { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }

    .divider { height: 1px; background: var(--line); margin: 8px 2px; }

    /* Empty state */
    .empty { text-align: center; padding: 48px 16px; color: var(--muted); font-size: 14px; }

    @media (max-width: 430px) {
      .stage { padding: 0; }
      .phone { width: 100vw; height: 100vh; height: 100dvh; min-height: 0; border: 0; border-radius: 0; box-shadow: none; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="phone">
      <div class="header">
        <div class="nav-row">
          <button class="back-btn" onclick="goBack()">‹ 返回</button>
          <span class="nav-title">学习记录</span>
        </div>
        <div class="week-summary">
          <div class="summary-row">
            <span class="summary-label">本周学习</span>
            <span class="summary-value">4 小时 32 分钟</span>
          </div>
          <div class="summary-avg">日均 39 分钟</div>
        </div>
      </div>

      <div class="scroll">
        <div class="content" id="logList"></div>
      </div>
    </div>
  </main>

  <script>
    var LEARN_DATA = [
      {
        date: '2026-06-20',
        dayLabel: '6月20日 周五',
        totalMinutes: 45,
        items: [
          { title: 'MG7 新品上市资料', type: 'PDF', minutes: 25 },
          { title: '成交话术演练', type: '视频', minutes: 20 }
        ]
      },
      {
        date: '2026-06-19',
        dayLabel: '6月19日 周四',
        totalMinutes: 30,
        items: [
          { title: '留资开口标准话术', type: 'PPT', minutes: 30 }
        ]
      },
      {
        date: '2026-06-18',
        dayLabel: '6月18日 周三',
        totalMinutes: 60,
        items: [
          { title: 'MG4 产品核心卖点讲解', type: 'PDF', minutes: 30 },
          { title: '竞品对比分析 — 秦 PLUS vs MG4', type: 'Word', minutes: 30 }
        ]
      },
      {
        date: '2026-06-17',
        dayLabel: '6月17日 周二',
        totalMinutes: 35,
        items: [
          { title: '金融方案推荐技巧', type: 'PPT', minutes: 35 }
        ]
      },
      {
        date: '2026-06-16',
        dayLabel: '6月16日 周一',
        totalMinutes: 50,
        items: [
          { title: '试驾邀约标准流程', type: '视频', minutes: 20 },
          { title: 'MG Cyberster 展厅接待攻略', type: 'PDF', minutes: 30 }
        ]
      }
    ];

    function renderList() {
      var html = '';
      LEARN_DATA.forEach(function(day) {
        html += '<div class="day-group">';
        html += '<div class="day-header">';
        html += '<span class="day-date">' + day.dayLabel + '</span>';
        html += '<span class="day-duration">' + day.totalMinutes + ' 分钟</span>';
        html += '</div>';
        day.items.forEach(function(item) {
          html += '<div class="log-item">';
          html += '<div class="log-info">';
          html += '<div class="log-title">' + item.title + '</div>';
          html += '<div class="log-meta">' + item.type + '</div>';
          html += '</div>';
          html += '<div class="log-duration">' + item.minutes + ' 分钟</div>';
          html += '</div>';
        });
        html += '</div>';
      });
      document.getElementById('logList').innerHTML = html;
    }

    function goBack() {
      if (document.referrer && document.referrer.indexOf('成交教练') > -1) {
        window.history.back();
      } else {
        window.location.href = '成交教练.html';
      }
    }

    renderList();
  </script>
</body>
</html>
