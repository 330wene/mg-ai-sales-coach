<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>听销冠分享 — 今验学习</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  min-height:100%;
  background:#dceaf8;
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  color:#1e293b;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
}
button{font:inherit;color:inherit;border:0;background:none;cursor:pointer}

.stage{min-height:100vh;display:grid;place-items:center;padding:18px}
.phone{
  position:relative;
  width:min(390px,100vw);
  height:min(844px,calc(100vh - 36px));
  min-height:700px;
  overflow:hidden;
  background:#eef3fa;
  border:1px solid #cdd8ea;
  border-radius:28px;
  box-shadow:0 24px 64px rgba(20,32,52,.2);
}
.scroll{
  height:100%;overflow-y:auto;overscroll-behavior:contain;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.scroll::-webkit-scrollbar{display:none}

.nav-bar{
  position:sticky;top:0;z-index:5;
  display:flex;align-items:center;justify-content:center;
  min-height:50px;padding:14px 16px;
  background:#08172b;color:#fff;font-size:15px;font-weight:700;
}
.page-body{padding:14px 14px 24px;display:grid;gap:10px}

/* ===== Unified list block ===== */
.champ-block{
  background:#fff;border:1px solid #dde4f0;border-radius:14px;
  box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 14px rgba(0,0,0,.04);
  overflow:hidden;
}
.champ-row{
  display:flex;align-items:center;gap:10px;
  padding:15px 14px;
  cursor:pointer;transition:background .15s;
}
.champ-row:active{background:#f8f9fb}
.champ-divider{
  height:1px;background:#eef1f5;
  margin:0 14px;
}
.champ-num{
  font-size:14px;font-weight:700;color:#b0c8e0;flex-shrink:0;
}
.champ-tag{
  font-size:10px;font-weight:600;color:#1677FF;
  border:1px dashed #1677FF;padding:2px 7px;border-radius:4px;
  flex-shrink:0;
}
.champ-name{font-size:14px;font-weight:700}
.champ-spacer{flex:1;min-width:0}
.champ-play{
  display:flex;align-items:center;gap:6px;
  font-size:13px;font-weight:600;color:#1677FF;
  padding:8px 14px;border-radius:20px;background:#eaf2ff;
  transition:background .15s;white-space:nowrap;
  flex-shrink:0;
}
.champ-play:active{background:#d6e4ff}
.champ-play svg{width:14px;height:14px;fill:#1677FF}

/* ============================================
   Overlay
   ============================================ */
.listen-overlay{
  position:absolute;inset:0;z-index:20;
  background:rgba(0,0,0,0);
  pointer-events:none;
  transition:background .35s ease;
}
.listen-overlay.active{
  background:rgba(0,0,0,.5);
  pointer-events:auto;
}

/* ============================================
   Panel
   ============================================ */
.listen-panel{
  position:absolute;bottom:0;left:0;right:0;z-index:21;
  background:#fff;border-radius:20px 20px 0 0;
  box-shadow:0 -8px 40px rgba(0,0,0,.12);
  transform:translateY(100%);
  transition:transform .42s cubic-bezier(.22,.61,.36,1);
  overflow:visible;
}
.listen-overlay.active .listen-panel{transform:translateY(0)}

/* ── Inner layout ── */
.listen-card-inner{
  display:flex;align-items:flex-start;gap:0;
  padding:12px 24px 0;
  position:relative;
}

/* ── Figure (left) — smaller, peeks above card ── */
.listen-figure-col{
  flex:0 0 56px;
  position:relative;
  margin-top:-38px;
  margin-right:8px;
}
.listen-figure-img{
  display:block;
  width:56px;height:auto;
  filter:drop-shadow(0 2px 12px rgba(0,0,0,.2));
  opacity:0;transform:translateY(20px);
  transition:all .45s cubic-bezier(.22,.61,.36,1) .1s;
}
.listen-overlay.active .listen-figure-img{
  opacity:1;transform:translateY(0);
}

/* ── Content (right) ── */
.listen-content-col{
  flex:1;min-width:0;
  padding-top:2px;
}

/* 正在分享 + 时长 */
.listen-now-label{
  font-size:15px;font-weight:700;color:#1677FF;
  display:flex;align-items:center;gap:6px;
  margin-bottom:6px;
}
.listen-now-label::before{
  content:'';flex:0 0 auto;
  width:8px;height:8px;border-radius:50%;
  background:#10b981;
  animation:pulseDot 1.2s ease-in-out infinite;
}
@keyframes pulseDot{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.3;transform:scale(.6)}
}
.listen-duration{
  font-weight:400;color:#94a3b8;font-size:13px;
}

/* Sound waves */
.listen-waves{
  display:flex;align-items:center;gap:4px;
  height:24px;margin-bottom:12px;
}
.listen-wave-bar{
  width:4px;border-radius:2px;background:#1677FF;
  animation:waveAnim .8s ease-in-out infinite;
}
.listen-wave-bar:nth-child(1){height:10px;animation-delay:0s}
.listen-wave-bar:nth-child(2){height:20px;animation-delay:.1s}
.listen-wave-bar:nth-child(3){height:14px;animation-delay:.2s}
.listen-wave-bar:nth-child(4){height:22px;animation-delay:.3s}
.listen-wave-bar:nth-child(5){height:10px;animation-delay:.15s}
@keyframes waveAnim{
  0%,100%{transform:scaleY(1)}
  50%{transform:scaleY(.4)}
}

/* ============================================
   Buttons — full width
   ============================================ */
.listen-actions{
  margin:0 -24px;  /* bleed to panel edges */
  display:flex;gap:0;
}
.listen-done-btn{
  flex:1;padding:14px 0;
  text-align:center;font-size:15px;font-weight:700;
  color:#fff;
  background:linear-gradient(135deg,#2E8FFF,#1677FF);
  border-radius:0 0 0 20px;
  transition:background .15s;
}
.listen-done-btn:active{background:#0E5FD8}
.listen-next-btn{
  flex:1;padding:14px 0;
  text-align:center;font-size:15px;font-weight:700;
  color:#1677FF;
  background:#eaf2ff;
  border-radius:0 0 20px 0;
  transition:background .15s;
}
.listen-next-btn:active{background:#d6e4ff}

</style>
</head>
<body>

<main class="stage">
<div class="phone" id="phone">

<div class="scroll">
  <nav class="nav-bar">成交教练</nav>
  <div class="page-body">

    <section>

      <div class="champ-block">
        <div class="champ-row" onclick="startChampion(0)">
          <span class="champ-num">1</span>
          <span class="champ-tag">宝安店</span>
          <span class="champ-name">小李</span>
          <span class="champ-spacer"></span>
          <button class="champ-play" onclick="event.stopPropagation();startChampion(0)">
            <svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
            点击听销冠分享
          </button>
        </div>

        <div class="champ-divider"></div>

        <div class="champ-row" onclick="startChampion(1)">
          <span class="champ-num">2</span>
          <span class="champ-tag">宝安店</span>
          <span class="champ-name">李晨</span>
          <span class="champ-spacer"></span>
          <button class="champ-play" onclick="event.stopPropagation();startChampion(1)">
            <svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
            点击听销冠分享
          </button>
        </div>

        <div class="champ-divider"></div>

        <div class="champ-row" onclick="startChampion(2)">
          <span class="champ-num">3</span>
          <span class="champ-tag">西乡店</span>
          <span class="champ-name">阿强</span>
          <span class="champ-spacer"></span>
          <button class="champ-play" onclick="event.stopPropagation();startChampion(2)">
            <svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
            点击听销冠分享
          </button>
        </div>
      </div>
    </section>

  </div>
</div>

<!-- ===== Overlay ===== -->
<div class="listen-overlay" id="listenOverlay" onclick="if(event.target===this)closeListen()">
  <div class="listen-panel" id="listenPanel">

    <div class="listen-card-inner">
      <div class="listen-figure-col">
        <img class="listen-figure-img" src="零售大师.png" alt="大师">
      </div>
      <div class="listen-content-col">
        <div class="listen-now-label"><span id="listenNowLabel">销冠小李正在分享</span><span class="listen-duration" id="listenDuration"> · 约3分钟</span></div>
        <div class="listen-waves">
          <div class="listen-wave-bar"></div>
          <div class="listen-wave-bar"></div>
          <div class="listen-wave-bar"></div>
          <div class="listen-wave-bar"></div>
          <div class="listen-wave-bar"></div>
        </div>
      </div>
    </div>

    <div class="listen-actions">
      <button class="listen-done-btn" onclick="closeListen()">听完了</button>
      <button class="listen-next-btn" onclick="playNext()">听下一个分享</button>
    </div>

  </div>
</div>

</div><!-- /phone -->
</main>

<script>
var CHAMPIONS = [
  { name: '小李', duration: '约3分钟', tts: '小李的成交分享。销冠支招：接待宝妈客户时，不聊枯燥配置，专门聊她带娃出门的难处。客户觉得被理解了，主动问怎么订车，当场成交。另外，前面监视组的同事都在问续航的问题，我已经把总部关于续航的资料整理好了，马上发给大家，方便你们给客户讲清楚。' },
  { name: '李晨', duration: '约2分钟', tts: '李晨的成交分享。销冠支招：遇到不爱说话的客户，先聊家里几口人、平时去哪玩。等客户放松了，才愿意讲真实需求，后面推荐车型完全不踩雷。另外，前面监视组的同事都在问续航的问题，我已经把总部关于续航的资料整理好了，马上发给大家，方便你们给客户讲清楚。' },
  { name: '阿强', duration: '约4分钟', tts: '阿强的成交分享。销冠支招：客户纠结不敢下单时，先说明订车没有风险、优惠可退，消除顾虑后再讲购车政策，很容易当场成交。另外，前面监视组的同事都在问续航的问题，我已经把总部关于续航的资料整理好了，马上发给大家，方便你们给客户讲清楚。' }
];

var curIndex = 0;
var synth = window.speechSynthesis;
var utterance = null;

function startChampion(idx) {
  curIndex = idx;
  document.getElementById('listenOverlay').classList.add('active');
  updateLabel();
  playCurrent();
}

function playCurrent() {
  stopTTS();
  var champ = CHAMPIONS[curIndex];
  utterance = new SpeechSynthesisUtterance(champ.tts);
  utterance.lang = 'zh-CN';
  utterance.rate = 0.95;
  utterance.onend = function(){};
  utterance.onerror = function(){};
  synth.speak(utterance);
}

function playNext() {
  curIndex = (curIndex + 1) % CHAMPIONS.length;
  updateLabel();
  playCurrent();
}

function updateLabel() {
  var c = CHAMPIONS[curIndex];
  document.getElementById('listenNowLabel').textContent = '销冠' + c.name + '正在分享';
  document.getElementById('listenDuration').textContent = ' · ' + c.duration;
}

function closeListen() {
  stopTTS();
  document.getElementById('listenOverlay').classList.remove('active');
}

function stopTTS() {
  synth.cancel();
  utterance = null;
}
</script>
</body>
</html>
