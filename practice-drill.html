<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="description" content="成交教练 · 对练">
  <meta name="theme-color" content="#080d17">
  <title>对练 · 产品讲解</title>
  <style>
    :root {
      --bg-deep:    #080d17;
      --bg-page:    #0b1121;
      --bg-card:    #111827;
      --bg-card-alt:#161f32;
      --bg-input:   #1a2540;

      --accent:        #4a8cff;
      --accent-strong: #3b7eef;
      --accent-glow:   rgba(74,140,255,0.35);
      --accent-soft:   rgba(74,140,255,0.08);

      --gold:          #f5a623;
      --gold-soft:     rgba(245,166,35,0.12);
      --green:         #10b981;
      --green-soft:    rgba(16,185,129,0.12);
      --purple:        #8b5cf6;
      --purple-soft:   rgba(139,92,246,0.12);

      --text-primary:  #e8ecf4;
      --text-body:     #b4c0d4;
      --text-muted:    #7d8fa6;

      --border-card:   #1e2a3f;
      --border-subtle: #162033;

      --shadow-card:  0 2px 8px rgba(0,0,0,0.28);
      --shadow-btn:   0 4px 20px rgba(74,140,255,0.25);

      --radius:   12px;
      --radius-lg:16px;
      --radius-xl:20px;
      --radius-full:28px;

      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out:   cubic-bezier(0.65, 0, 0.35, 1);
      --ease-breathing: cubic-bezier(0.45, 0, 0.55, 1);

      --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%; min-height: 100dvh;
      background: #050914;
      color: var(--text-primary);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }
    button { appearance: none; border: 0; background: none; color: inherit; font: inherit; cursor: pointer; }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    .stage { min-height: 100vh; min-height: 100dvh; display: grid; place-items: center; padding: 18px; }
    .phone {
      width: min(390px, 100vw); height: min(844px, calc(100dvh - 36px));
      min-height: 700px; overflow: hidden;
      background: var(--bg-page);
      border: 1px solid #1e2a3f;
      border-radius: 28px;
      box-shadow: 0 0 60px rgba(74,140,255,0.04), 0 24px 64px rgba(0,0,0,0.45);
      display: flex; flex-direction: column;
    }

    .screen { display: none; flex-direction: column; flex: 1; height: 100%; overflow: hidden; }
    .screen.active { display: flex; }

    .hide-scroll { scrollbar-width: none; }
    .hide-scroll::-webkit-scrollbar { display: none; }

    /* ============================================================
       KEYFRAMES
       ============================================================ */
    @keyframes voiceWave {
      0%,100% { transform: scaleY(0.35); opacity: 0.35; }
      50%     { transform: scaleY(1);    opacity: 1; }
    }
    @keyframes coachWave {
      0%,100% { height: 4px;  opacity: 0.3; }
      30%     { height: 14px; opacity: 0.8; }
      60%     { height: 6px;  opacity: 0.5; }
    }
    @keyframes speakBtnBreathe {
      0%,100% { box-shadow: 0 4px 24px rgba(74,140,255,0.25); transform: scale(1); }
      50%     { box-shadow: 0 4px 36px rgba(74,140,255,0.45); transform: scale(1.012); }
    }
    @keyframes speakShimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes streamIn {
      0%   { opacity: 0; transform: translateY(6px); max-height: 0; }
      60%  { opacity: 0.7; }
      100% { opacity: 1; transform: translateY(0); max-height: 200px; }
    }
    @keyframes breatheGlow {
      0%,100% { box-shadow: 0 0 4px rgba(74,140,255,0.08), 0 0 8px rgba(74,140,255,0.04); }
      50%     { box-shadow: 0 0 12px rgba(74,140,255,0.18), 0 0 24px rgba(74,140,255,0.08); }
    }
    @keyframes trophyBreathe {
      0%,100% { box-shadow: 0 0 20px rgba(245,166,35,0.06); }
      50%     { box-shadow: 0 0 50px rgba(245,166,35,0.18); }
    }

    /* ============================================================
       HEADER — topbar + 6-step dot indicator
       ============================================================ */
    .pr-header { padding: 12px 16px 0; flex-shrink: 0; }
    .pr-topbar { display: flex; align-items: center; gap: 10px; }
    .pr-back {
      width: 30px; height: 30px; display: grid; place-items: center;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 50%;
      font-size: 18px; color: var(--text-muted); flex-shrink: 0;
    }
    .pr-topbar-title { font-size: 14px; font-weight: 700; color: var(--text-primary); flex: 1; }

    /* Step dots — two rows, 3 per row. Full names, real vs AI clearly labeled */
    .pr-steps { padding: 10px 16px 4px; }
    .pr-step-row { display: flex; align-items: flex-start; gap: 0; margin-bottom: 6px; }
    .pr-step-row:last-child { margin-bottom: 0; }
    .pr-step-row-label {
      font-size: 8px; font-weight: 700; letter-spacing: 0.3px;
      margin-bottom: 2px; padding-left: 2px;
    }
    .pr-step-row-label.real  { color: var(--green); }
    .pr-step-row-label.ai    { color: var(--purple); }
    .pr-step-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      flex: 1; min-width: 0;
    }
    .pr-step-dot {
      width: 26px; height: 26px; border-radius: 50%;
      display: grid; place-items: center; flex-shrink: 0;
      font-size: 10px; font-weight: 800;
      background: var(--bg-input); border: 2px solid var(--border-subtle);
      color: var(--text-muted);
      transition: all 0.35s var(--ease-out-expo);
      cursor: pointer; position: relative; z-index: 1;
    }
    .pr-step-dot.active {
      background: var(--accent); border-color: var(--accent); color: #fff;
      box-shadow: 0 0 14px rgba(74,140,255,0.3);
    }
    .pr-step-dot.done {
      background: var(--green); border-color: var(--green); color: #fff;
    }
    .pr-step-label {
      font-size: 10px; font-weight: 600; text-align: center;
      line-height: 1.3; word-break: keep-all;
    }
    .pr-step-label.real { color: var(--green); }
    .pr-step-label.ai   { color: var(--purple); }
    .pr-step-line {
      width: 20px; height: 2px; background: var(--border-subtle);
      margin-top: 12px; flex-shrink: 0;
      transition: background 0.4s var(--ease-out-expo);
    }
    .pr-step-line.done { background: var(--green); }

    /* ============================================================
       CHAT AREA — premium conversation feel
       ============================================================ */
    .pr-scroll {
      flex: 1; overflow-y: auto; overscroll-behavior: contain;
      padding: 8px 16px 0; scrollbar-width: none;
    }
    .pr-scroll::-webkit-scrollbar { display: none; }

    /* Coach message bubble */
    .msg-coach {
      display: flex; flex-direction: column; gap: 6px;
      margin-bottom: 18px;
      animation: fadeInDown 0.4s var(--ease-out-expo) both;
    }
    .msg-coach-sender {
      font-size: 10px; font-weight: 700; color: var(--gold);
      display: flex; align-items: center; gap: 5px;
    }
    .msg-coach-sender .avatar-mini {
      width: 18px; height: 18px; display: grid; place-items: center;
      background: rgba(245,166,35,0.15); border-radius: 50%; font-size: 10px;
    }
    .msg-bubble {
      padding: 12px 14px; border-radius: var(--radius); border-top-left-radius: 4px;
      font-size: 13px; line-height: 1.6;
    }
    .msg-bubble.coach {
      background: rgba(40,55,85,0.5);
      border: 1px solid rgba(255,255,255,0.05);
      color: var(--text-body);
    }

    /* Customer message — appears with stream-delay */
    .msg-customer {
      display: flex; flex-direction: column; gap: 6px;
      margin-bottom: 10px;
      animation: streamIn 0.6s var(--ease-out-expo) both;
    }
    .msg-customer-sender {
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      display: flex; align-items: center; gap: 5px;
    }
    .msg-customer-sender .avatar-mini {
      width: 18px; height: 18px; display: grid; place-items: center;
      color: #fff; background: #3d4f6a; border-radius: 50%; font-size: 9px;
    }
    .msg-bubble.customer {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      color: var(--text-body);
      box-shadow: var(--shadow-card);
    }

    /* Breathing playback indicator below customer message */
    .playback-indicator {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0; margin-bottom: 14px;
      animation: fadeInUp 0.4s var(--ease-out-expo) 0.3s both;
    }
    .playback-waves {
      display: flex; align-items: flex-end; gap: 3px; height: 16px;
    }
    .playback-waves .pw {
      width: 3px; background: var(--accent); border-radius: 2px;
      animation: voiceWave 0.65s ease-in-out infinite;
    }
    .playback-waves .pw:nth-child(1) { animation-delay: 0s; height: 6px; }
    .playback-waves .pw:nth-child(2) { animation-delay: 0.1s; height: 14px; }
    .playback-waves .pw:nth-child(3) { animation-delay: 0.2s; height: 9px; }
    .playback-waves .pw:nth-child(4) { animation-delay: 0.3s; height: 16px; }
    .playback-waves .pw:nth-child(5) { animation-delay: 0.4s; height: 7px; }
    .playback-label {
      font-size: 10px; font-weight: 600; color: var(--accent);
      animation: breatheGlow 2s var(--ease-breathing) infinite;
    }

    /* Tag badge */
    .pr-tag {
      display: inline-block; padding: 3px 10px; border-radius: 4px;
      font-size: 9px; font-weight: 700; margin-bottom: 14px;
      color: var(--accent); background: rgba(74,140,255,0.1);
      border: 1px solid rgba(74,140,255,0.12);
    }

    /* Guide hint */
    .pr-guide { margin-bottom: 14px; animation: streamIn 0.5s var(--ease-out-expo) both; }
    .pr-guide-card {
      padding: 14px 16px;
      background: rgba(74,140,255,0.04);
      border: 1px solid rgba(74,140,255,0.1);
      border-radius: var(--radius);
    }
    .pr-guide-label {
      display: flex; align-items: center; gap: 4px;
      color: var(--accent); font-size: 9px; font-weight: 800; margin-bottom: 6px;
    }
    .pr-guide-text { font-size: 13px; line-height: 1.6; font-weight: 600; color: var(--text-primary); }

    /* Bottom breathing wave button */
       BOTTOM BREATHING WAVE BUTTON
       ============================================================ */
    .pr-bottom {
      padding: 8px 16px 20px; flex-shrink: 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    .btn-speak-main {
      width: 100%; min-height: 56px; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; padding: 12px 20px;
      color: #fff;
      background: linear-gradient(135deg, #3b7eef 0%, #5b9bff 100%);
      border-radius: var(--radius-full);
      font-size: 15px; font-weight: 800;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 24px rgba(74,140,255,0.25);
      animation: speakBtnBreathe 3s var(--ease-breathing) infinite;
      transition: transform 0.15s var(--ease-out-expo);
    }
    .btn-speak-main:active { transform: scale(0.97); }
    .btn-speak-main::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 50%, transparent 100%);
      animation: speakShimmer 3.5s ease-in-out infinite;
    }
    .speak-waves {
      display: flex; align-items: flex-end; gap: 3px; height: 16px;
      position: relative; z-index: 1;
    }
    .speak-waves .sw {
      width: 3px; background: rgba(255,255,255,0.5); border-radius: 2px;
      transition: all 0.3s;
    }
    .btn-speak-main.idle .speak-waves .sw {
      animation: voiceWave 2.5s var(--ease-breathing) infinite;
    }
    .btn-speak-main.idle .speak-waves .sw:nth-child(1) { animation-delay: 0s; height: 6px; }
    .btn-speak-main.idle .speak-waves .sw:nth-child(2) { animation-delay: 0.4s; height: 12px; }
    .btn-speak-main.idle .speak-waves .sw:nth-child(3) { animation-delay: 0.2s; height: 8px; }
    .btn-speak-main.idle .speak-waves .sw:nth-child(4) { animation-delay: 0.6s; height: 14px; }
    .btn-speak-main.idle .speak-waves .sw:nth-child(5) { animation-delay: 0.35s; height: 10px; }

    .btn-speak-main.listening {
      background: linear-gradient(135deg, #f5a623 0%, #f7b84e 100%);
      box-shadow: 0 4px 36px rgba(245,166,35,0.4);
      animation: speakBtnBreathe 1.5s var(--ease-breathing) infinite;
    }
    .btn-speak-main.listening .speak-waves .sw {
      background: rgba(255,255,255,0.8);
      animation: voiceWave 0.5s ease-in-out infinite;
    }
    .btn-speak-main.listening .speak-waves .sw:nth-child(1) { animation-delay: 0s; height: 6px; }
    .btn-speak-main.listening .speak-waves .sw:nth-child(2) { animation-delay: 0.08s; height: 16px; }
    .btn-speak-main.listening .speak-waves .sw:nth-child(3) { animation-delay: 0.16s; height: 10px; }
    .btn-speak-main.listening .speak-waves .sw:nth-child(4) { animation-delay: 0.24s; height: 18px; }
    .btn-speak-main.listening .speak-waves .sw:nth-child(5) { animation-delay: 0.32s; height: 8px; }

    .btn-speak-main.done {
      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      box-shadow: 0 4px 24px rgba(16,185,129,0.3);
      animation: none;
    }
    .btn-speak-main.done .speak-waves .sw {
      background: rgba(255,255,255,0.6); animation: none; opacity: 0.7;
    }

    .speak-label { position: relative; z-index: 1; font-size: 14px; font-weight: 700; }

    /* Next / End */
    .btn-next {
      width: 100%; min-height: 46px; display: none;
      align-items: center; justify-content: center; gap: 6px;
      padding: 12px; color: #fff;
      background: linear-gradient(135deg, #3b7eef 0%, #4a8cff 100%);
      border-radius: var(--radius); font-size: 14px; font-weight: 800;
      transition: transform 0.15s var(--ease-out-expo);
    }
    .btn-next:active { transform: scale(0.97); }
    .btn-next.show { display: flex; }
    .btn-end {
      width: 100%; min-height: 36px; display: flex;
      align-items: center; justify-content: center;
      padding: 8px; color: var(--text-muted); font-size: 12px; font-weight: 600;
    }
    .btn-end:active { color: var(--text-body); }

    /* ============================================================
       COMPLETION SCREEN
       ============================================================ */
    .cp-scroll {
      flex: 1; overflow-y: auto; overscroll-behavior: contain;
      display: flex; flex-direction: column; align-items: center;
      text-align: center; padding: 40px 24px 28px; scrollbar-width: none;
    }
    .cp-scroll::-webkit-scrollbar { display: none; }
    .cp-trophy-wrap {
      width: 100px; height: 100px; position: relative;
      display: grid; place-items: center; margin-bottom: 20px;
    }
    .cp-trophy-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid rgba(245,166,35,0.2);
      background: rgba(245,166,35,0.04);
      animation: trophyBreathe 2.5s var(--ease-breathing) infinite;
    }
    .cp-trophy-ring-outer {
      position: absolute; inset: -10px; border-radius: 50%;
      border: 1px solid rgba(245,166,35,0.08);
      animation: trophyBreathe 2.5s var(--ease-breathing) infinite 0.6s;
      pointer-events: none;
    }
    .cp-icon { font-size: 42px; position: relative; z-index: 1; }
    .cp-title { font-size: 26px; font-weight: 900; color: var(--text-primary); }
    .cp-sub { margin-top: 8px; color: var(--text-body); font-size: 14px; line-height: 1.6; }
    .cp-sub b { color: var(--text-primary); }
    .cp-stats { width: 100%; margin-top: 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cp-stat {
      padding: 18px 14px; background: var(--bg-card);
      border: 1px solid var(--border-card); border-radius: var(--radius); text-align: center;
    }
    .cp-stat-val { font-size: 30px; font-weight: 900; color: var(--accent); }
    .cp-stat-label { margin-top: 4px; font-size: 11px; color: var(--text-muted); }
    .cp-store {
      width: 100%; margin-top: 16px; padding: 18px 16px;
      background: var(--bg-card); border: 1px solid var(--border-card); border-radius: var(--radius);
    }
    .cp-store-label { font-size: 13px; font-weight: 700; color: var(--text-primary); }
    .cp-store-sub { margin-top: 4px; font-size: 11px; color: var(--text-muted); }
    .cp-store-avatars { display: flex; justify-content: center; margin-top: 12px; }
    .cp-store-avatar {
      width: 34px; height: 34px; display: grid; place-items: center;
      border-radius: 50%; border: 2px solid var(--bg-card); font-size: 11px;
      font-weight: 700; color: #fff; margin-left: -8px;
    }
    .cp-store-avatar:first-child { margin-left: 0; }
    .cp-store-avatar:nth-child(1) { background: #4b5563; }
    .cp-store-avatar:nth-child(2) { background: #6b7280; }
    .cp-store-avatar:nth-child(3) { background: #9ca3af; }
    .cp-store-avatar:nth-child(4) { background: #4b5563; }
    .cp-store-avatar:nth-child(5) { background: #6b7280; }
    .cp-store-more {
      width: 34px; height: 34px; display: grid; place-items: center;
      border-radius: 50%; border: 2px solid var(--bg-card);
      background: #1f2937; font-size: 9px; font-weight: 700;
      color: var(--text-muted); margin-left: -8px;
    }
    .cp-actions { width: 100%; margin-top: 24px; display: flex; flex-direction: column; gap: 8px; }
    .btn-again {
      width: 100%; min-height: 46px; display: flex; align-items: center;
      justify-content: center; gap: 6px; padding: 12px;
      color: #fff; background: linear-gradient(135deg, #3b7eef 0%, #4a8cff 100%);
      border-radius: var(--radius); font-size: 14px; font-weight: 800;
      transition: transform 0.15s var(--ease-out-expo);
    }
    .btn-again:active { transform: scale(0.97); }
    .btn-goback {
      width: 100%; min-height: 40px; display: flex; align-items: center;
      justify-content: center; padding: 10px; color: var(--text-muted);
      font-size: 12px; font-weight: 600;
    }
    .btn-goback:active { color: var(--text-body); }

    @media (max-width: 430px) {
      .stage { padding: 0; }
      .phone { width: 100vw; height: 100dvh; min-height: 0; border: 0; border-radius: 0; box-shadow: none; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="phone" role="application" aria-label="产品讲解对练">

      <!-- ==================== PRACTICE ==================== -->
      <div class="screen active" id="practiceScreen">
        <div class="pr-header">
          <div class="pr-topbar">
            <button class="pr-back" onclick="confirmEndPractice()" aria-label="返回">‹</button>
            <span class="pr-topbar-title">场景对练</span>
          </div>
          <div class="pr-steps" id="prSteps"></div>
        </div>

        <div class="pr-scroll" id="prScroll">
          <!-- Coach message -->
          <div class="msg-coach" id="msgCoach">
            <div class="msg-coach-sender">
              <div class="avatar-mini" style="overflow:hidden;"><img src="零售大师.png" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt=""></div>
              <span>成交教练</span>
            </div>
            <div class="msg-bubble coach" id="msgCoachText"></div>
          </div>

          <!-- Customer message — streams in after delay -->
          <div class="msg-customer" id="msgCustomer" style="display:none;">
            <div class="msg-customer-sender">
              <div class="avatar-mini" id="msgCustAvatar">客</div>
              <span id="msgCustName">客户</span>
            </div>
            <div class="msg-bubble customer" id="msgCustText"></div>
          </div>

          <!-- Breathing playback indicator below customer message -->
          <div class="playback-indicator" id="playbackIndicator" style="display:none;">
            <div class="playback-waves">
              <span class="pw"></span><span class="pw"></span><span class="pw"></span><span class="pw"></span><span class="pw"></span>
            </div>
            <span class="playback-label">正在播放</span>
          </div>

          <!-- Tag -->
          <span class="pr-tag" id="prTag">还原产品讲解</span>

          <!-- Guide hint -->
          <div class="pr-guide" id="prGuide" style="display:none;">
            <div class="pr-guide-card">
              <div class="pr-guide-label">💡 你应该这样回应</div>
              <div class="pr-guide-text" id="prGuideText"></div>
            </div>
          </div>

        </div>

        <div class="pr-bottom">
          <button class="btn-speak-main idle" id="btnSpeakMain" type="button">
            <span class="speak-waves">
              <span class="sw"></span><span class="sw"></span><span class="sw"></span><span class="sw"></span><span class="sw"></span>
            </span>
            <span class="speak-label" id="speakLabel">点击开始回答</span>
          </button>
          <button class="btn-next" id="btnNext" type="button"><span id="btnNextLabel">下一组 ›</span></button>
          <button class="btn-end" id="btnEndPractice" type="button">结束练习</button>
        </div>
      </div>

      <!-- ==================== COMPLETION ==================== -->
      <div class="screen" id="completionScreen">
        <div class="cp-scroll">
          <div class="cp-trophy-wrap">
            <div class="cp-trophy-ring-outer"></div>
            <div class="cp-trophy-ring"></div>
            <div class="cp-icon">🏆</div>
          </div>
          <div class="cp-title">太棒了</div>
          <div class="cp-sub">你今天完成了一次完整的对练，<br>每多练一次，面对客户就<b>多一分底气</b>。</div>
          <div class="cp-stats">
            <div class="cp-stat">
              <div class="cp-stat-val">6<small style="font-size:15px;font-weight:600;"> 组</small></div>
              <div class="cp-stat-label">今日完成对练</div>
            </div>
            <div class="cp-stat">
              <div class="cp-stat-val">~8<small style="font-size:15px;font-weight:600;"> 分钟</small></div>
              <div class="cp-stat-label">练习时长</div>
            </div>
          </div>
          <div class="cp-store">
            <div class="cp-store-label">张江门店</div>
            <div class="cp-store-sub">今日已有 12 位同事完成对练</div>
            <div class="cp-store-avatars">
              <div class="cp-store-avatar">李</div><div class="cp-store-avatar">王</div><div class="cp-store-avatar">张</div><div class="cp-store-avatar">赵</div><div class="cp-store-avatar">陈</div>
              <div class="cp-store-more">+7</div>
            </div>
          </div>
          <div class="cp-actions">
            <button class="btn-again" onclick="restartPractice()" type="button">再练一次</button>
            <button class="btn-goback" id="btnGoBack" onclick="goBackAfterComplete()" type="button">返回产品讲解</button>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script>
    var PRACTICE_GROUPS = [
      { id:'r1', type:'review', tag:'还原产品讲解', title:'带娃的姐姐 · MG7空间讲解', customerName:'带娃的姐姐', customerMsg:'后排放两个安全座椅，还能再坐一个大人吗？我平时还要带老人出门。', guide:'不要先报参数。先把空间翻译成一家人怎么坐：两个安全座椅装好，中间还能坐一个大人，接老人也方便。' },
      { id:'r2', type:'review', tag:'还原产品讲解', title:'看半天的小伙子 · 配置与需求', customerName:'看半天的小伙子', customerMsg:'你讲了一堆配置，但我还是没搞明白，这车跟我每天上下班有什么关系？', guide:'别继续堆配置。问客户每天通勤多久、走什么路，然后把配置翻译成他每天遇到的具体场景。' },
      { id:'r3', type:'review', tag:'还原产品讲解', title:'带媳妇那哥 · 婴儿车放置', customerName:'带媳妇那哥', customerMsg:'我媳妇比较在意后备箱，婴儿车好放吗？平时还要买菜装东西。', guide:'不要只说容积数字。让客户想象：婴儿车折叠后竖着放，旁边还能搁两袋超市的东西，媳妇肯定满意。' },
      { id:'e1', type:'extend', tag:'AI 举一反三', title:'带父母的女儿 · 老人上下车', customerName:'带父母的女儿', customerMsg:'我爸妈年纪大了腿脚不太方便，这个车上下车会不会很费劲？', guide:'用场景代入法：车门开合角度大，座椅高度刚好不用弯腰也不用爬，让客户想象爸妈一抬脚就能坐进去。' },
      { id:'e2', type:'extend', tag:'AI 举一反三', title:'刚拿驾照的女生 · 安全配置', customerName:'刚拿驾照的女生', customerMsg:'我刚拿了驾照不久，这个车有什么对我这种新手比较友好的功能吗？', guide:'不讲复杂术语。说自动刹车就像副驾坐了个老司机帮你踩刹车，车道保持就像方向盘自己会回正。' },
      { id:'e3', type:'extend', tag:'AI 举一反三', title:'做生意的老板 · 商务接待', customerName:'做生意的老板', customerMsg:'我偶尔要接客户吃饭，后排空间够不够体面？不能让人觉得挤。', guide:'不用参数，用画面：客户坐后排翘个二郎腿，中间扶手放下来搁茶杯，聊着聊着就到了。' }
    ];

    var isDirect = (function(){
      var params = new URLSearchParams(window.location.search);
      return params.get('direct') === 'true';
    })();

    var championCase = (function(){
      var params = new URLSearchParams(window.location.search);
      return params.get('case') || null;
    })();

    var currentIndex = 0;
    var total = PRACTICE_GROUPS.length;
    var isListening = false;
    var completed = false;
    var streamTimers = [];
    var $ = function(id){ return document.getElementById(id); };

    // ---- Build step dots with labels ----
    (function buildSteps(){
      var realSteps = '', aiSteps = '';
      var prevReviewIdx = -1, prevAiIdx = -1;
      PRACTICE_GROUPS.forEach(function(g,i){
        var typeClass = g.type === 'review' ? 'real' : 'ai';
        var item = '<div class="pr-step-item">'
          + '<div class="pr-step-dot" data-index="' + i + '">' + (i+1) + '</div>'
          + '<div class="pr-step-label ' + typeClass + '">' + g.customerName + '</div>'
          + '</div>';
        if (g.type === 'review') {
          if (prevReviewIdx >= 0) realSteps += '<div class="pr-step-line" data-left="' + prevReviewIdx + '"></div>';
          realSteps += item;
          prevReviewIdx = i;
        } else {
          if (prevAiIdx >= 0) aiSteps += '<div class="pr-step-line" data-left="' + prevAiIdx + '"></div>';
          aiSteps += item;
          prevAiIdx = i;
        }
      });

      $('prSteps').innerHTML =
        '<div class="pr-step-row-label real">● 真实场景</div>'
        + '<div class="pr-step-row">' + realSteps + '</div>'
        + '<div class="pr-step-row-label ai" style="margin-top:6px;">● AI 模拟</div>'
        + '<div class="pr-step-row">' + aiSteps + '</div>';

      $('prSteps').addEventListener('click', function(e){
        var dot = e.target.closest('.pr-step-dot');
        if (!dot) return;
        var idx = parseInt(dot.getAttribute('data-index'));
        if (idx === currentIndex) return;
        clearStreamTimers();
        currentIndex = idx;
        loadGroup(currentIndex);
      });
    })();

    function clearStreamTimers(){
      streamTimers.forEach(function(t){ clearTimeout(t); });
      streamTimers = [];
    }

    function updateStepDots(current){
      var dots = document.querySelectorAll('#prSteps .pr-step-dot');
      var lines = document.querySelectorAll('#prSteps .pr-step-line');
      dots.forEach(function(dot,i){
        dot.classList.remove('active','done');
        if (i < current) { dot.classList.add('done'); dot.textContent = '✓'; }
        else if (i === current) { dot.classList.add('active'); dot.textContent = (i+1); }
        else { dot.textContent = (i+1); }
      });
      lines.forEach(function(line){
        var left = parseInt(line.getAttribute('data-left'));
        line.classList.toggle('done', left < current);
      });
    }

    function buildCoachIntro(g){
      if (g.type === 'review') {
        return '先为你还原「' + g.customerName + '」的真实场景';
      } else {
        return '为你生成「' + g.customerName + '」的举一反三练习';
      }
    }

    // ---- Screen switching ----
    function showScreen(id){
      document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
      var el = $(id);
      if (el) el.classList.add('active');
    }

    // ---- Load a group — show everything immediately ----
    function loadGroup(i){
      var g = PRACTICE_GROUPS[i];
      isListening = false;
      clearStreamTimers();

      // Step dots
      updateStepDots(i);

      // Show everything immediately — no streaming delays
      $('msgCustomer').style.display = 'flex';
      $('playbackIndicator').style.display = 'flex';
      $('prGuide').style.display = 'block';
      $('btnNext').classList.remove('show');

      var speakBtn = $('btnSpeakMain');
      speakBtn.classList.remove('listening','done');
      speakBtn.classList.add('idle');
      $('speakLabel').textContent = '点击开始回答';

      // Set coach / customer / guide text
      $('msgCoachText').textContent = buildCoachIntro(g);
      $('msgCustName').textContent = g.customerName;
      $('msgCustText').textContent = g.customerMsg;
      $('prTag').textContent = g.tag;
      $('prGuideText').textContent = g.guide;

      // Re-trigger coach fade-in
      var coachEl = $('msgCoach');
      coachEl.style.animation = 'none'; coachEl.offsetHeight;
      coachEl.style.animation = 'fadeInDown 0.4s cubic-bezier(0.16,1,0.3,1) both';

      // Customer stream-in
      var cust = $('msgCustomer');
      cust.style.animation = 'none'; cust.offsetHeight;
      cust.style.animation = 'streamIn 0.5s cubic-bezier(0.16,1,0.3,1) both';

      // Scroll to top
      $('prScroll').scrollTop = 0;
    }

    // ---- Speaking ----
    $('btnSpeakMain').addEventListener('click', function(){
      var btn = this;
      if (btn.classList.contains('done')) return;
      if (!isListening) startListening();
    });

    function startListening(){
      isListening = true;
      var btn = $('btnSpeakMain');
      btn.classList.remove('idle');
      btn.classList.add('listening');
      $('speakLabel').textContent = '正在聆听...';

      streamTimers.push(setTimeout(function(){ if (isListening) completeSpeaking(); }, 4500));
    }

    function completeSpeaking(){
      isListening = false;

      var btn = $('btnSpeakMain');
      btn.classList.remove('idle','listening');
      btn.classList.add('done');
      $('speakLabel').textContent = '已收到回答 ✓';
      $('btnNext').classList.add('show');
      $('btnNextLabel').textContent = currentIndex >= total - 1 ? '完成练习' : '下一组 ›';
    }

    // ---- Next ----
    $('btnNext').addEventListener('click', function(){
      if (currentIndex >= total - 1) { showCompletion(); return; }
      currentIndex++;
      loadGroup(currentIndex);
    });

    // ---- End ----
    function confirmEndPractice(){
      if (completed) { goBack(); return; }
      if (currentIndex > 0 || isListening) {
        if (confirm('确定要结束本次练习吗？已完成的进度不会丢失。')) showCompletion();
      } else {
        goBack();
      }
    }
    function goBack(){
      if (championCase) { window.location.href = 'champion-case-detail.html?case=' + championCase; }
      else if (isDirect) { window.location.href = 'product-explanation.html'; }
      else { history.back(); }
    }
    $('btnEndPractice').addEventListener('click', confirmEndPractice);

    // ---- Completion ----
    function showCompletion(){
      completed = true; isListening = false;
      clearStreamTimers();
      updateStepDots(total);
      if (championCase) {
        $('btnGoBack').textContent = '回去看看销冠怎么做 →';
        $('btnGoBack').style.fontWeight = '700';
        $('btnGoBack').style.color = 'var(--accent)';
      } else if (isDirect) {
        $('btnGoBack').textContent = '回去看看销冠怎么做的 →';
        $('btnGoBack').style.fontWeight = '700';
        $('btnGoBack').style.color = 'var(--accent)';
      }
      showScreen('completionScreen');
    }

    function goBackAfterComplete(){
      if (championCase) { window.location.href = 'champion-case-detail.html?case=' + championCase; }
      else if (isDirect) { window.location.href = 'product-explanation.html?step=2'; }
      else { history.back(); }
    }

    function restartPractice(){
      var qs = championCase ? '?direct=true&case=' + championCase : '?direct=true';
      if (isDirect || championCase) { window.location.href = 'practice-drill.html' + qs; }
      else { window.location.href = 'practice-drill.html'; }
    }

    // ---- Init: start immediately ----
    if (isDirect) {
      loadGroup(0);
    } else {
      loadGroup(0);
    }
  </script>
</body>
</html>
