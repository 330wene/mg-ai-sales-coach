<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="description" content="销冠成交案例详情">
  <meta name="theme-color" content="#08172b">
  <title>销冠案例详情</title>
  <style>
    /* ===== Design Tokens ===== */
    :root {
      --navy-950: #071327;
      --navy-900: #0b234a;
      --navy-800: #08172b;
      --primary: #1677FF;
      --primary-light: #EAF2FF;
      --accent:       #c2410c;
      --accent-soft:  #fff7ed;
      --accent-light: #ffedd5;
      --success: #10b981;
      --ink: #1e293b;
      --text: #334155;
      --muted: #94a3b8;
      --line: #e2e8f0;
      --page: #eef1f6;
      --card: #fff;
      --card-border: #dde4f0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.035), 0 2px 8px rgba(0,0,0,.025);
      --shadow:    0 1px 3px rgba(0,0,0,.04), 0 4px 14px rgba(0,0,0,.04);
      --shadow-lg: 0 24px 64px rgba(20, 32, 52, .2);
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    /* ===== Reset ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%; background: #dfe4ec;
      font-family: var(--font); color: var(--ink);
      -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
    }
    button { font: inherit; color: inherit; border: 0; background: none; cursor: pointer; -webkit-user-select: none; user-select: none; }
    button:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 4px; }

    /* ===== Phone Container ===== */
    .stage { min-height: 100vh; display: grid; place-items: center; padding: 18px; }
    .phone {
      position: relative; width: min(390px, 100vw); height: min(844px, calc(100vh - 36px));
      min-height: 700px; overflow: hidden; background: var(--page);
      border: 1px solid #cfd6e1; border-radius: 28px; box-shadow: var(--shadow-lg);
    }
    .scroll { height: 100%; overflow-y: auto; overscroll-behavior: contain; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .scroll::-webkit-scrollbar { display: none; }

    /* ============================================
       TOP NAV BAR
       ============================================ */
    .detail-nav {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      min-height: 50px; padding: 14px 16px;
      background: var(--navy-800);
    }
    .detail-back {
      position: absolute; left: 14px;
      width: 28px; height: 28px; display: grid; place-items: center;
      color: #fff; font-size: 18px;
      border: 1px solid rgba(255,255,255,.18); border-radius: 50%;
      transition: background 0.15s;
      text-decoration: none;
    }
    .detail-back:active { background: rgba(255,255,255,.1); }
    .detail-nav-title {
      font-size: 15px; font-weight: 700; color: #fff; text-align: center;
      padding: 0 40px; line-height: 1.35;
    }

    /* ===== Body ===== */
    .detail-body { padding: 12px 14px 30px; display: grid; gap: 10px; }

    /* ============================================
       CORE INSIGHT CARD — 浅米黄色
       ============================================ */
    .core-insight {
      background: #fffbef;
      border: 1px solid #fef0d0;
      border-radius: var(--radius-lg);
      padding: 16px;
      position: relative;
    }
    .core-tag {
      display: inline-block;
      padding: 4px 10px;
      margin-bottom: 12px;
      font-size: 10.5px; font-weight: 700; color: var(--accent);
      border: 1px solid var(--accent); border-radius: 20px;
    }
    .core-title {
      font-size: 18px; font-weight: 800; color: var(--ink); line-height: 1.4;
      margin-bottom: 8px;
    }
    .core-desc {
      font-size: 13px; color: var(--text); line-height: 1.6;
      margin-bottom: 12px;
    }
    .core-bottom {
      font-size: 13px; font-weight: 600; color: var(--accent);
      padding-top: 10px; border-top: 1px solid #fef0d0;
    }

    /* ============================================
       SECTION CARDS — 白色大圆角
       ============================================ */
    .section-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .section-card.muted-bg {
      background: #f6f7fa;
      border-color: #eaecf2;
      box-shadow: none;
    }
    .section-title {
      font-size: 15px; font-weight: 800; color: var(--ink);
      margin-bottom: 14px;
    }

    /* ===== Numbered items ===== */
    .num-item {
      display: flex; gap: 11px; align-items: flex-start;
    }
    .num-item + .num-item { margin-top: 18px; }
    .num-circle {
      flex: 0 0 22px; width: 22px; height: 22px; display: grid; place-items: center;
      background: #eef0f5; color: var(--text); border-radius: 50%;
      font-size: 12px; font-weight: 700; margin-top: 2px;
    }
    .num-body { min-width: 0; }
    .num-label {
      display: inline-block; font-size: 11px; font-weight: 700; color: #7a4e1f;
      background: #fff7ed; padding: 3px 8px; border-radius: 4px;
      margin-bottom: 4px;
    }
    .num-text {
      font-size: 13px; color: var(--text); line-height: 1.55; margin-top: 0;
    }

    /* ===== Response block: 回应 + 为什么管用 ===== */
    .response-block {
      margin-top: 10px;
      background: #f6f7fa;
      border-left: 1px solid #dde4f0;
      border-radius: 8px;
      padding: 12px 13px 10px;
    }
    .response-block .num-label {
      margin-bottom: 5px;
    }
    .response-block .why-line {
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid #e8ecf2;
      font-size: 12px; color: #596579; line-height: 1.55;
    }
    .why-line b { color: var(--ink); }

    /* ============================================
       WHAT HAPPENED STRIP — 客户说了什么 → 通常回应 → 他这样接
       ============================================ */
    .what-happened-strip {
      margin-top: 10px;
      padding: 12px 13px;
      background: #fafbfc;
      border-radius: 8px;
      border: 1px solid #edf0f4;
    }
    .what-happened-row {
      display: flex; gap: 8px; align-items: flex-start;
      font-size: 12px; line-height: 1.55;
    }
    .what-happened-row + .what-happened-row { margin-top: 10px; }
    .what-happened-label {
      flex: 0 0 auto; font-size: 9px; font-weight: 700; letter-spacing: 0.03em;
      padding: 2px 7px; border-radius: 3px; margin-top: 1px;
    }
    .what-happened-label.customer { color: #7a4e1f; background: #fff7ed; }
    .what-happened-label.typical { color: #6b7280; background: #f3f4f6; }
    .what-happened-label.champion { color: #1d7a45; background: #def0e4; }
    .what-happened-text { color: var(--text); min-width: 0; }

    /* ============================================
       LEARNING SECTION — 浅灰卡片
       ============================================ */
    .learn-item {
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 13px; color: var(--text); line-height: 1.6;
    }
    .learn-item + .learn-item { margin-top: 14px; }
    .learn-num {
      flex: 0 0 20px; width: 20px; height: 20px; display: grid; place-items: center;
      background: var(--accent); color: #fff; border-radius: 50%;
      font-size: 11px; font-weight: 700; margin-top: 2px;
    }
    .learn-body b { color: var(--ink); font-weight: 700; }

    /* ===== Practice CTA inside learning card ===== */
    .practice-cta {
      margin-top: 16px; padding-top: 14px;
      border-top: 1px solid #e8ecf2;
    }
    .practice-cta-title {
      font-size: 14px; font-weight: 800; color: var(--ink);
      margin-bottom: 8px;
    }
    .practice-scene {
      padding: 12px 13px;
      background: #fff;
      border: 1px solid #e8ecf2;
      border-radius: 8px;
      font-size: 13px; color: var(--text); line-height: 1.55;
      margin-bottom: 10px;
    }
    .practice-scene-label {
      font-size: 10px; font-weight: 700; color: var(--muted);
      margin-bottom: 5px; letter-spacing: 0.03em;
    }
    .practice-btn {
      width: 100%; min-height: 44px;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      background: var(--accent); color: #fff; border-radius: 10px;
      font-size: 14px; font-weight: 700;
      box-shadow: 0 3px 12px rgba(194,65,12,.18);
      transition: background 0.15s, transform 0.12s;
    }
    .practice-btn:active { background: #b03a0b; transform: scale(.98); }

    /* Deep blue variant for practice queue */
    .practice-btn-blue {
      background: #0b234a;
      box-shadow: 0 3px 12px rgba(11,35,74,.25);
    }
    .practice-btn-blue:active { background: #081b38; }

    /* ===== Responsive ===== */
    @media (max-width: 430px) {
      .stage { padding: 0; }
      .phone { width: 100vw; height: 100vh; height: 100dvh; min-height: 0; border: 0; border-radius: 0; box-shadow: none; }
    }

    /* ================================================================= */
    /*  COUNTDOWN OVERLAY                                                 */
    /* ================================================================= */
    .countdown-overlay {
      position: fixed; inset: 0; z-index: 35;
      background: linear-gradient(170deg, #040b18 0%, #08162e 40%, #0d1f44 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .35s ease; overflow: hidden;
    }
    .countdown-overlay.show { opacity: 1; pointer-events: auto; }
    .countdown-overlay::before {
      content: ""; position: absolute; top: 50%; left: 50%; width: 300px; height: 300px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(59,130,246,.12) 0%, rgba(59,130,246,.03) 40%, transparent 70%);
      pointer-events: none;
    }
    .countdown-overlay::after {
      content: ""; position: absolute; top: 30%; right: 20%; width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(245,166,35,.06) 0%, transparent 70%); pointer-events: none;
    }
    .countdown-master { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; margin-bottom: 48px; }
    .countdown-crown { width: 44px; height: 44px; display: grid; place-items: center; margin-bottom: 8px; }
    .countdown-crown svg { width: 32px; height: 32px; }
    .countdown-master-label { font-size: 14px; font-weight: 600; color: rgba(255,255,255,.7); letter-spacing: 2px; }
    .countdown-master-sub { font-size: 11px; color: rgba(255,255,255,.35); margin-top: 4px; }
    .countdown-number {
      position: relative; z-index: 1; font-size: 120px; font-weight: 800; color: #fff; line-height: 1;
      text-shadow: 0 0 60px rgba(59,130,246,.5), 0 0 120px rgba(59,130,246,.2);
      transition: transform .1s ease, opacity .1s ease;
    }
    .countdown-number.pop { animation: countPop .55s cubic-bezier(0.22, 0.61, 0.36, 1); }
    @keyframes countPop {
      0%   { transform: scale(0.3); opacity: .2; }
      50%  { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .countdown-number.go {
      font-size: 64px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-shadow: none; animation: goShine .6s ease;
    }
    @keyframes goShine {
      0%   { transform: scale(0.2); opacity: 0; }
      60%  { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .countdown-ring {
      position: absolute; top: 50%; left: 50%; width: 200px; height: 200px;
      transform: translate(-50%, -50%); border-radius: 50%;
      border: 1px solid rgba(255,255,255,.08); pointer-events: none;
    }
    .countdown-ring.pulse { animation: ringPulse 1s ease-out; }
    @keyframes ringPulse {
      0%   { width: 180px; height: 180px; opacity: .6; border-color: rgba(59,130,246,.3); }
      100% { width: 320px; height: 320px; opacity: 0; border-color: transparent; }
    }

    /* ================================================================= */
    /*  PRACTICE OVERLAY — 沉浸式深蓝 Drill 模式                           */
    /* ================================================================= */
    .practice-overlay {
      position: fixed; inset: 0; z-index: 30;
      background: linear-gradient(170deg, #060d1a 0%, #0a1628 35%, #0f1f3d 100%);
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none; transition: opacity .35s ease;
    }
    .practice-overlay.show { opacity: 1; pointer-events: auto; }
    .practice-overlay::before {
      content: ""; position: absolute; top: -80px; right: -60px; width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(59,130,246,.07) 0%, transparent 70%); pointer-events: none;
    }
    .practice-overlay::after {
      content: ""; position: absolute; bottom: 10%; left: -40px; width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(245,166,35,.04) 0%, transparent 70%); pointer-events: none;
    }

    /* ---- 练习顶栏 ---- */
    .practice-topbar {
      position: relative; z-index: 2; display: flex; align-items: center;
      padding: 12px 14px 10px; gap: 6px;
      background: rgba(6,13,26,.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .practice-back {
      width: 28px; height: 28px; display: grid; place-items: center;
      color: rgba(255,255,255,.5); border: 1px solid rgba(255,255,255,.15);
      border-radius: 50%; font-size: 16px; transition: background .15s, color .15s;
    }
    .practice-back:active { background: rgba(255,255,255,.08); color: #fff; }
    .stepper { flex: 1; display: flex; align-items: flex-start; justify-content: center; gap: 0; padding: 0 4px; }
    .step-wrap { display: flex; flex-direction: column; align-items: center; flex: 0 0 auto; }
    .step-dot {
      width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center;
      font-size: 11px; font-weight: 700;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.35); transition: all .3s ease;
    }
    .step-dot.done { background: rgba(16,185,129,.25); border-color: rgba(16,185,129,.5); color: #10b981; }
    .step-dot.current {
      background: rgba(59,130,246,.25); border-color: rgba(59,130,246,.6); color: #60a5fa;
      box-shadow: 0 0 12px rgba(59,130,246,.3);
    }
    .step-label { font-size: 9px; color: rgba(255,255,255,.25); margin-top: 4px; white-space: nowrap; transition: color .3s ease; text-align: center; line-height: 1.2; }
    .step-label.current { color: rgba(255,255,255,.75); font-weight: 600; }
    .step-label.done    { color: rgba(255,255,255,.4); }
    .step-line { width: 18px; height: 1px; background: rgba(255,255,255,.08); margin: 11px 2px 0; flex: 0 0 auto; transition: background .3s ease; }
    .step-line.done { background: rgba(16,185,129,.35); }
    .stepper-spacer { width: 32px; flex: 0 0 auto; }

    /* ---- 练习主体 ---- */
    .practice-body {
      position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column;
      padding: 0 20px; overflow-y: auto; overscroll-behavior: contain;
    }
    .practice-body::-webkit-scrollbar { display: none; }

    /* ---- 客户聊天气泡 ---- */
    .chat-area {
      flex: 0 0 auto; padding: 24px 0 0;
      animation: chatSlideIn .45s cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    @keyframes chatSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .chat-client-label { font-size: 10px; color: rgba(255,255,255,.3); margin-bottom: 6px; margin-left: 46px; letter-spacing: 1px; }
    .chat-row { display: flex; align-items: flex-end; gap: 8px; }
    .chat-avatar {
      width: 34px; height: 34px; flex: 0 0 auto; border-radius: 50%;
      background: linear-gradient(135deg, #374151, #4b5563);
      border: 1px solid rgba(255,255,255,.1); display: grid; place-items: center; font-size: 16px;
    }
    .chat-bubble {
      flex: 0 1 auto; max-width: 75%;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.08);
      border-radius: 6px 14px 14px 14px; padding: 14px 16px;
      font-size: 15px; color: #e2e8f0; line-height: 1.7; letter-spacing: .3px; position: relative;
    }
    .chat-bubble::after {
      content: ""; position: absolute; left: -6px; bottom: 10px; width: 10px; height: 8px;
      background: rgba(255,255,255,.07); clip-path: polygon(100% 0, 0 50%, 100% 100%);
      border-left: 1px solid rgba(255,255,255,.08);
    }

    /* ---- 场景上下文条 ---- */
    .context-bar {
      flex: 0 0 auto; margin: 0 -20px; padding: 8px 20px;
      background: rgba(255,255,255,.04); border-bottom: 0.5px solid rgba(255,255,255,.05);
      font-size: 12px; color: rgba(255,255,255,.35); line-height: 1.5;
      position: sticky; top: 0; z-index: 2;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .context-bar-icon { display: inline-block; margin-right: 4px; font-size: 11px; }

    /* ---- 回合指示器 ---- */
    .round-indicator {
      flex: 0 0 auto; display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 14px 0 6px;
    }
    .round-label {
      font-size: 12px; color: rgba(255,255,255,.35); font-weight: 500;
      letter-spacing: .5px; min-width: 52px; text-align: right;
    }
    .round-dots { display: flex; align-items: center; gap: 6px; }
    .round-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,.1); transition: all .3s ease;
    }
    .round-dot.active { background: #3b82f6; box-shadow: 0 0 8px rgba(59,130,246,.35); }
    .round-dot.done { background: rgba(16,185,129,.5); }

    /* ---- 教练点评卡 ---- */
    .coach-review-card {
      flex: 0 0 auto; margin-top: 14px;
      padding: 14px 16px;
      background: rgba(245,166,35,.06); border: 0.5px solid rgba(245,166,35,.15);
      border-radius: 12px;
      animation: reviewSlideIn .4s cubic-bezier(0.22, 0.61, 0.36, 1) both;
    }
    @keyframes reviewSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .coach-review-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; color: rgba(245,166,35,.7); font-weight: 600;
      margin-bottom: 8px; letter-spacing: 1px;
    }
    .coach-review-badge svg { width: 12px; height: 12px; }
    .coach-review-text {
      font-size: 13.5px; color: rgba(255,255,255,.75); line-height: 1.7;
    }

    /* ---- 参考话术（自动展开） ---- */
    .reference-content {
      overflow: hidden; transition: max-height .35s ease, opacity .25s ease, margin .3s ease;
    }
    .reference-content.open { max-height: 300px; opacity: 1; }
    .reference-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: rgba(16,185,129,.7); font-weight: 600;
      letter-spacing: 1px; margin-bottom: 8px;
    }
    .reference-inner {
      padding: 12px 14px; margin-bottom: 4px;
      background: rgba(16,185,129,.05); border: 0.5px solid rgba(16,185,129,.12);
      border-radius: 10px; font-size: 13px; color: rgba(255,255,255,.6);
      line-height: 1.7;
    }
    .reference-inner strong { color: rgba(255,255,255,.8); }

    /* ---- 自动推进提示 ---- */
    .auto-advance-hint {
      text-align: center; font-size: 11px; color: rgba(255,255,255,.18);
      margin-top: 16px; animation: reviewSlideIn .4s .6s cubic-bezier(0.22, 0.61, 0.36, 1) both;
    }

    /* ---- 小组小结卡 ---- */
    .group-summary-card {
      flex: 0 0 auto; margin-top: 20px;
      padding: 24px 20px;
      background: rgba(16,185,129,.06); border: 1px solid rgba(16,185,129,.15);
      border-radius: 16px;
      animation: summaryPop .5s cubic-bezier(0.22, 0.61, 0.36, 1) both;
      text-align: center;
    }
    @keyframes summaryPop {
      from { opacity: 0; transform: scale(.95) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .summary-check {
      width: 48px; height: 48px; margin: 0 auto 16px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%; font-size: 24px; color: #fff;
      box-shadow: 0 0 32px rgba(16,185,129,.2);
    }
    .summary-title {
      font-size: 14px; color: rgba(255,255,255,.5); font-weight: 500;
      margin-bottom: 10px;
    }
    .summary-text {
      font-size: 14px; color: rgba(255,255,255,.75); line-height: 1.8;
      text-align: left;
    }
    .btn-finish-group {
      width: 100%; min-height: 46px; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff; border-radius: 12px; font-size: 15px; font-weight: 600;
      box-shadow: 0 4px 18px rgba(16,185,129,.25);
      transition: background .15s, transform .12s;
      margin-top: 16px; flex: 0 0 auto;
    }
    .btn-finish-group:active { transform: scale(.98); }

    /* ---- 已完成回合的聊天区 ---- */
    .chat-area.dim { opacity: .5; }

    /* ---- 底部点击区 ---- */
    .tap-zone {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 44px; min-height: 160px;
    }
    .tap-circle-wrap {
      position: relative; width: 104px; height: 104px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .tap-circle-wrap::before {
      content: ""; position: absolute; inset: -10px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.06);
      animation: tapBreathe 2.8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes tapBreathe {
      0%, 100% { transform: scale(1);   opacity: .35; }
      50%      { transform: scale(1.13); opacity: .08; }
    }
    .tap-circle {
      width: 104px; height: 104px; position: relative; z-index: 1;
      border-radius: 50%; background: #0a1424;
      border: 1.5px solid rgba(255,255,255,.08);
      display: grid; place-items: center;
      transition: transform .15s, background .35s, border-color .35s, box-shadow .35s;
      box-shadow: 0 0 40px rgba(0,0,0,.3);
    }
    .tap-circle:active { transform: scale(.94); }
    .tap-inner {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,.03);
      display: grid; place-items: center;
      transition: all .35s;
    }
    .tap-inner-icon { color: rgba(255,255,255,.2); transition: color .35s, transform .35s; }
    .tap-inner-icon svg { width: 18px; height: 18px; }
    .tap-circle.done {
      background: rgba(16,185,129,.1); border-color: rgba(16,185,129,.35);
      box-shadow: 0 0 48px rgba(16,185,129,.15);
    }
    .tap-circle.done .tap-inner { background: rgba(16,185,129,.15); }
    .tap-circle.done .tap-inner-icon { color: #10b981; transform: scale(1.2); }
    .tap-hint { font-size: 13px; color: rgba(255,255,255,.35); margin-top: 18px; text-align: center; transition: color .3s; }
    .tap-hint.done { color: rgba(16,185,129,.6); }

    /* ---- 完成页 ---- */
    .finish-page {
      display: none; flex: 1; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 30px; animation: fadeIn .3s ease; position: relative; z-index: 1;
    }
    .finish-page.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .finish-crown {
      width: 64px; height: 64px; display: grid; place-items: center; margin-bottom: 16px;
    }
    .finish-crown svg { width: 44px; height: 44px; }
    .finish-icon-check {
      width: 56px; height: 56px; display: grid; place-items: center;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%; font-size: 28px; color: #fff;
      margin-bottom: 20px; box-shadow: 0 0 40px rgba(16,185,129,.25);
    }
    .finish-count {
      font-size: 15px; color: rgba(255,255,255,.55);
      margin-bottom: 4px;
    }
    .finish-count strong { color: #fff; font-size: 20px; }
    .finish-title {
      font-size: 17px; color: rgba(255,255,255,.8); line-height: 1.7; font-weight: 600; margin-bottom: 6px;
    }
    .finish-sub {
      font-size: 13px; color: rgba(255,255,255,.4);
      margin-bottom: 32px; line-height: 1.5;
    }
    .finish-actions { display: flex; gap: 12px; width: 100%; max-width: 280px; }
    .finish-actions button { flex: 1; min-height: 46px; border-radius: 12px; font-size: 14px; font-weight: 600; }
    .btn-ghost-light {
      border: 1px solid rgba(255,255,255,.12); color: rgba(255,255,255,.55);
      background: transparent; transition: background .15s, color .15s, border-color .15s;
    }
    .btn-ghost-light:active { background: rgba(255,255,255,.06); color: #fff; border-color: rgba(255,255,255,.25); }
    .btn-solid-gold {
      background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff;
      box-shadow: 0 4px 16px rgba(245,158,11,.3);
      transition: background .15s, transform .12s, box-shadow .15s;
    }
    .btn-solid-gold:active { transform: scale(.98); box-shadow: 0 2px 8px rgba(245,158,11,.2); }

    /* Toast */
    .toast {
      position: fixed; z-index: 40; left: 50%; bottom: 100px;
      max-width: 82%; padding: 10px 16px; color: #fff;
      background: rgba(14,24,41,.92); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-radius: 22px; font-size: 13px; font-weight: 500; text-align: center; font-family: var(--font);
      opacity: 0; pointer-events: none; transform: translate(-50%, 12px);
      transition: opacity .25s ease, transform .25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

  <script>

      // ====== 案例练习数据（每组 3 回合） ======

                reference: '「没问题，您先回去跟他聊聊。对了姐——您老公最在意的是什么？油耗还是空间？我帮您准备一下，下次他来我重点给他看那个。」<br><br><strong>为什么这样接——</strong>把被动的「等通知」变成主动的「我帮您准备」。同时摸清老公的关切点，提前布好局。'
              },
              {
                customer: '他主要担心油耗。那你帮我算算，一个月大概多少油钱？',
                coach: '拿到了老公的关键关切点！现在帮她算一笔她回去能直接讲给老公听的账。给她一个简单好记的数字，让她回去有话说。',
                reference: '「姐您记好——上下班开的话，一公里 5 毛钱。您回去就跟老公说：我去看过了，一公里 5 毛，你算算比咱现在那车省多少。这样他也有个具体的点来考虑。对了，这个优惠我今天先帮您占着，您回去商量完随时找我——不想要了随时退，一分不少。」<br><br><strong>为什么这样接——</strong>给她「回去怎么说」的具体话术，加上「随时退」的安全网。她回去不再是"老公你猜这车怎么样"，而是"老公你算算，一公里 5 毛"。'
              }
            ],
            summary: '这组练的是——「回去商量」不是拒绝，是你没给她足够的素材去商量。三个回合你给了她时间锚、老公关切点、回去怎么说的话术，外加一个随时可退的安全网。'
          }
        ]
      };

      // ====== 练习状态 ======
      var currentPracticeCase = null;
      var currentData = [];
      var currentGroup = 0;
      var currentRoundInGroup = 0;
      var groupPhase = 'speaking';   // 'speaking' | 'review' | 'summary'
      var tapLocked = false;
      var autoAdvanceTimer = null;

      var countdownOverlay = null;
      var practiceOverlay = null;
      var practiceBody = null;
      var finishPage = null;
      var stepperEl = null;
      var countdownNumber = null;
      var countdownRing = null;

      // ====== 3-2-1 倒计时 ======
      function runCountdown(callback) {
        if (!countdownOverlay) countdownOverlay = document.getElementById('countdownOverlay');
        if (!countdownNumber) countdownNumber = document.getElementById('countdownNumber');
        if (!countdownRing) countdownRing = document.getElementById('countdownRing');
        countdownOverlay.classList.add('show');
        var steps = [
          { num: '3', cls: '' }, { num: '2', cls: '' }, { num: '1', cls: '' }, { num: '开始', cls: 'go' }
        ];
        var i = 0;
        function tick() {
          if (i >= steps.length) { setTimeout(function () { countdownOverlay.classList.remove('show'); callback(); }, 200); return; }
          var s = steps[i];
          countdownNumber.textContent = s.num;
          countdownNumber.className = 'countdown-number pop';
          countdownRing.classList.remove('pulse'); void countdownRing.offsetWidth; countdownRing.classList.add('pulse');
          if (s.cls) countdownNumber.classList.add(s.cls);
          i++;
          setTimeout(tick, i === steps.length ? 600 : 750);
        }
        tick();
      }

      // ====== Stepper ======
      function buildStepper() {
        if (!stepperEl) stepperEl = document.getElementById('stepper');
        var h = '';
        currentData.forEach(function (d, i) {
          if (i > 0) h += '<span class="step-line" id="stepLine' + i + '"></span>';
          h += '<span class="step-wrap"><span class="step-dot" id="stepDot' + i + '">' + (i + 1) + '</span><span class="step-label" id="stepLabel' + i + '">' + d.shortName + '</span></span>';
        });
        stepperEl.innerHTML = h;
      }

      function updateStepper() {
        currentData.forEach(function (d, i) {
          var dot = document.getElementById('stepDot' + i);
          var label = document.getElementById('stepLabel' + i);
          var line = document.getElementById('stepLine' + i);
          if (!dot) return;
          dot.classList.remove('done', 'current');
          if (label) label.classList.remove('done', 'current');
          if (i < currentGroup) {
            dot.classList.add('done'); dot.textContent = '✓'; if (label) label.classList.add('done');
            if (line) line.classList.add('done');
          } else if (i === currentGroup) {
            dot.classList.add('current'); dot.textContent = i + 1; if (label) label.classList.add('current');
            if (line) line.classList.remove('done');
          } else {
            dot.textContent = i + 1;
            if (line) line.classList.remove('done');
          }
        });
      }

      // ====== 渲染回合圆点 ======
      function renderRoundDots(current, total) {
        var dots = '';
        for (var i = 0; i < total; i++) {
          var cls = '';
          if (i < current) cls = 'done';
          else if (i === current) cls = 'active';
          dots += '<span class="round-dot ' + cls + '"></span>';
        }
        return dots;
      }

      // ====== 渲染练习内容 ======
      function renderPracticeGroup() {
        if (!practiceBody) practiceBody = document.getElementById('practiceBody');
        tapLocked = false;
        clearTimeout(autoAdvanceTimer);
        var group = currentData[currentGroup];
        updateStepper();

        if (groupPhase === 'summary') {
          renderGroupSummary(group);
          return;
        }

        var round = group.rounds[currentRoundInGroup];
        var totalRounds = group.rounds.length;

        // 回合指示器
        var roundIndicator = '<div class="round-indicator"><span class="round-label">回合 ' + (currentRoundInGroup + 1) + '/' + totalRounds + '</span><div class="round-dots">' + renderRoundDots(currentRoundInGroup, totalRounds) + '</div></div>';

        // 客户聊天气泡
        var chatArea = '<div class="chat-area"><div class="chat-client-label">' + (group.type === 'real' ? '真实客户 · 接待原音' : '模拟场景') + '</div><div class="chat-row"><div class="chat-avatar">' + (group.type === 'real' ? '🧑' : '🤖') + '</div><div class="chat-bubble">' + round.customer + '</div></div></div>';

        if (groupPhase === 'speaking') {
          var tapZone = '<div class="tap-zone"><div class="tap-circle-wrap" onclick="handleTap()"><div class="tap-circle" id="tapCircle"><span class="tap-inner"><span class="tap-inner-icon" id="tapIcon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="1" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0"/><line x1="12" y1="17" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg></span></span></div></div><div class="tap-hint" id="tapHint">按住说话</div></div>';

          practiceBody.innerHTML = '<div class="context-bar"><span class="context-bar-icon">📍</span>' + group.context + '</div>' + roundIndicator + chatArea + tapZone;
        } else {
          var isLastRound = currentRoundInGroup >= totalRounds - 1;
          var reviewSection = '<div class="coach-review-card"><div class="coach-review-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 17l2-9 4 4 4-8 4 8 4-4 2 9H2z" stroke-linejoin="round"/><circle cx="12" cy="17" r="2" fill="currentColor" stroke="none"/></svg>教练点评</div><div class="coach-review-text">' + round.coach + '</div></div><div class="reference-content open" id="refContent"><div class="reference-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>销冠话术</div><div class="reference-inner" style="font-size:12.5px; color:rgba(255,255,255,.55);">' + round.reference + '</div></div><div class="auto-advance-hint">' + (isLastRound ? '稍后自动进入本组小结…' : '稍后自动进入下一回合…') + '</div>';

          practiceBody.innerHTML = '<div class="context-bar"><span class="context-bar-icon">📍</span>' + group.context + '</div>' + roundIndicator + chatArea + reviewSection;
        }

        practiceBody.scrollTop = 0;
      }

      // ====== 点按「按住说话」→ 自动点评 → 自动下一回合 ======
      function handleTap() {
        if (tapLocked) return;
        tapLocked = true;
        clearTimeout(autoAdvanceTimer);

        var circle = document.getElementById('tapCircle');
        var icon = document.getElementById('tapIcon');
        var hint = document.getElementById('tapHint');

        if (circle) circle.classList.add('done');
        if (icon) {
          icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
        }
        if (hint) { hint.classList.add('done'); hint.textContent = '收到了'; }

        setTimeout(function () {
          groupPhase = 'review';
          renderPracticeGroup();

          var group = currentData[currentGroup];
          var isLastRound = currentRoundInGroup >= group.rounds.length - 1;
          var delay = isLastRound ? 4500 : 5000;

          autoAdvanceTimer = setTimeout(function () {
            if (isLastRound) {
              groupPhase = 'summary';
              renderPracticeGroup();
            } else {
              currentRoundInGroup++;
              groupPhase = 'speaking';
              renderPracticeGroup();
            }
          }, delay);
        }, 600);
      }

      // ====== 小组小结 ======
      function renderGroupSummary(group) {
        if (!practiceBody) practiceBody = document.getElementById('practiceBody');
        var totalRounds = group.rounds.length;
        practiceBody.innerHTML = '<div class="context-bar"><span class="context-bar-icon">📍</span>' + group.context + '</div><div class="round-indicator"><span class="round-label" style="color:rgba(16,185,129,.6)">' + totalRounds + '/' + totalRounds + ' 回合完成</span><div class="round-dots">' + renderRoundDots(totalRounds, totalRounds) + '</div></div><div class="chat-area dim"><div class="chat-client-label">' + (group.type === 'real' ? '真实客户 · 接待原音' : '模拟场景') + '</div><div class="chat-row"><div class="chat-avatar">' + (group.type === 'real' ? '🧑' : '🤖') + '</div><div class="chat-bubble">' + group.rounds[totalRounds - 1].customer + '</div></div></div><div class="group-summary-card"><div class="summary-check">✓</div><div class="summary-title">这一组小结</div><div class="summary-text">' + group.summary + '</div></div><button class="btn-finish-group" onclick="finishGroup()">' + (currentGroup < currentData.length - 1 ? '进入下一组 →' : '完成全部练习 🎉') + '</button>';
        practiceBody.scrollTop = 0;
      }

      function finishGroup() {
        if (currentGroup < currentData.length - 1) {
          // 还有下一组
          currentGroup++;
          currentRoundInGroup = 0;
          groupPhase = 'speaking';
          renderPracticeGroup();
        } else {
          // 全部完成
          showFinishPage();
        }
      }

      // ====== 完成页 ======
      function showFinishPage() {
        if (!practiceBody) practiceBody = document.getElementById('practiceBody');
        if (!finishPage) finishPage = document.getElementById('finishPage');
        practiceBody.style.display = 'none';

        // Stepper all done
        currentData.forEach(function (d, i) {
          var dot = document.getElementById('stepDot' + i);
          var label = document.getElementById('stepLabel' + i);
          var line = document.getElementById('stepLine' + i);
          if (dot) { dot.classList.add('done'); dot.classList.remove('current'); dot.textContent = '✓'; }
          if (label) { label.classList.add('done'); label.classList.remove('current'); }
          if (line) line.classList.add('done');
        });

        finishPage.innerHTML = '<div class="finish-crown"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(245,166,35,.6)" stroke-width="1.5"><path d="M2 17l2-9 4 4 4-8 4 8 4-4 2 9H2z" stroke-linejoin="round"/><circle cx="12" cy="17" r="2" fill="rgba(245,166,35,.5)" stroke="none"/></svg></div><div class="finish-count">本轮完成了 <strong>3</strong> 组</div><div class="finish-title">练得不错！</div><div class="finish-sub">3 组 × 3 回合，每多练一次，<br>面对客户就多一分底气。</div><div class="finish-actions"><button class="btn-ghost-light" onclick="exitPractice()">结束练习</button><button class="btn-solid-gold" onclick="restartPractice()">再练一次</button></div>';
        finishPage.classList.add('active');
      }

      // ====== 启动练习 ======
      function startPractice(caseId) {
        if (!PRACTICE_DATA[caseId]) return;
        currentPracticeCase = caseId;
        currentData = PRACTICE_DATA[caseId].map(function (g) { return Object.assign({}, g); });
        currentGroup = 0;
        currentRoundInGroup = 0;
        groupPhase = 'speaking';
        tapLocked = false;
        clearTimeout(autoAdvanceTimer);

        if (!practiceOverlay) practiceOverlay = document.getElementById('practiceOverlay');
        if (!practiceBody) practiceBody = document.getElementById('practiceBody');
        if (!finishPage) finishPage = document.getElementById('finishPage');

        practiceOverlay.classList.add('show');
        document.body.style.overflow = 'hidden';
        finishPage.classList.remove('active');
        practiceBody.style.display = '';

        buildStepper();
        updateStepper();
        runCountdown(function () { renderPracticeGroup(); });
      }

      function exitPractice() {
        if (!practiceOverlay) practiceOverlay = document.getElementById('practiceOverlay');
        practiceOverlay.classList.remove('show');
        document.body.style.overflow = '';
      }

      function restartPractice() {
        if (!practiceOverlay) practiceOverlay = document.getElementById('practiceOverlay');
        if (!practiceBody) practiceBody = document.getElementById('practiceBody');
        if (!finishPage) finishPage = document.getElementById('finishPage');
        currentGroup = 0;
        currentRoundInGroup = 0;
        groupPhase = 'speaking';
        tapLocked = false;
        clearTimeout(autoAdvanceTimer);
        finishPage.classList.remove('active');
        practiceBody.style.display = '';
        buildStepper();
        updateStepper();
        runCountdown(function () { renderPracticeGroup(); });
      }
    })();
  </script>
</body>
</html>
