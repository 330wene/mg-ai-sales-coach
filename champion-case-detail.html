<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="description" content="销冠成交案例详情">
  <meta name="theme-color" content="#08172b">
  <title>销冠案例详情</title>
  <style>
    /* ===== Design Tokens ===== */
    :root {
      --navy-950: #071327;
      --navy-900: #0b234a;
      --navy-800: #08172b;
      --primary: #1677FF;
      --primary-light: #EAF2FF;
      --accent:       #c2410c;
      --accent-soft:  #fff7ed;
      --accent-light: #ffedd5;
      --success: #10b981;
      --ink: #1e293b;
      --text: #334155;
      --muted: #94a3b8;
      --line: #e2e8f0;
      --page: #eef1f6;
      --card: #fff;
      --card-border: #dde4f0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.035), 0 2px 8px rgba(0,0,0,.025);
      --shadow:    0 1px 3px rgba(0,0,0,.04), 0 4px 14px rgba(0,0,0,.04);
      --shadow-lg: 0 24px 64px rgba(20, 32, 52, .2);
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    /* ===== Reset ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%; background: #dfe4ec;
      font-family: var(--font); color: var(--ink);
      -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
    }
    button { font: inherit; color: inherit; border: 0; background: none; cursor: pointer; -webkit-user-select: none; user-select: none; }
    button:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 4px; }

    /* ===== Phone Container ===== */
    .stage { min-height: 100vh; display: grid; place-items: center; padding: 18px; }
    .phone {
      position: relative; width: min(390px, 100vw); height: min(844px, calc(100vh - 36px));
      min-height: 700px; overflow: hidden; background: var(--page);
      border: 1px solid #cfd6e1; border-radius: 28px; box-shadow: var(--shadow-lg);
    }
    .scroll { height: 100%; overflow-y: auto; overscroll-behavior: contain; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .scroll::-webkit-scrollbar { display: none; }

    /* ============================================
       TOP NAV BAR
       ============================================ */
    .detail-nav {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      min-height: 50px; padding: 14px 16px;
      background: var(--navy-800);
    }
    .detail-back {
      position: absolute; left: 14px;
      width: 28px; height: 28px; display: grid; place-items: center;
      color: #fff; font-size: 18px;
      border: 1px solid rgba(255,255,255,.18); border-radius: 50%;
      transition: background 0.15s;
      text-decoration: none;
    }
    .detail-back:active { background: rgba(255,255,255,.1); }
    .detail-nav-title {
      font-size: 15px; font-weight: 700; color: #fff; text-align: center;
      padding: 0 40px; line-height: 1.35;
    }

    /* ===== Body ===== */
    .detail-body { padding: 12px 14px 30px; display: grid; gap: 10px; }

    /* ============================================
       1 分钟速览卡片
       ============================================ */
    .quick-overview {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .quick-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .quick-title {
      font-size: 15px; font-weight: 800; color: var(--ink);
    }
    .time-badge {
      font-size: 11px; font-weight: 700; color: #1d7a45;
      background: #def0e4; padding: 3px 8px; border-radius: 10px;
      white-space: nowrap;
    }

    /* 关键三步 */
    .quick-steps {
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .quick-label {
      font-size: 10.5px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 10px;
    }
    .quick-step-item {
      display: flex; gap: 9px; align-items: flex-start;
    }
    .quick-step-item + .quick-step-item { margin-top: 10px; }
    .quick-step-num {
      flex: 0 0 auto; font-size: 11.5px; font-weight: 700; color: var(--accent);
      margin-top: 1px; line-height: 1.5;
    }
    .quick-step-body { min-width: 0; }
    .quick-step-up,
    .quick-step-down {
      font-size: 12.5px; line-height: 1.55;
      display: flex; gap: 6px; align-items: baseline;
    }
    .quick-step-up + .quick-step-down { margin-top: 8px; }
    .quick-step-tag {
      flex: 0 0 auto;
      font-size: 10px; font-weight: 700;
      padding: 1px 5px; border-radius: 3px;
      line-height: 1.6;
      white-space: nowrap;
    }
    .quick-step-up .quick-step-tag {
      background: #f1f5f9; color: #64748b;
    }
    .quick-step-down .quick-step-tag {
      background: #fff7ed; color: #c2410c;
    }

    /* 记住两点 */
    .quick-learn-item {
      display: flex; gap: 9px; align-items: flex-start;
      font-size: 13px; color: var(--text); line-height: 1.55;
    }
    .quick-learn-item + .quick-learn-item { margin-top: 10px; }
    .quick-learn-num {
      flex: 0 0 18px; width: 18px; height: 18px; display: grid; place-items: center;
      background: #eef0f5; color: var(--text); border-radius: 50%;
      font-size: 10.5px; font-weight: 700; margin-top: 2px;
    }

    /* ============================================
       展开按钮
       ============================================ */
    .expand-bar {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 46px;
      margin: 0 0 2px;
      padding: 12px 20px;
      background: var(--navy-900);
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
      user-select: none;
      color: #fff;
    }
    .expand-bar:active { opacity: .88; }
    .expand-bar-collapsed,
    .expand-bar-expanded {
      font-size: 14px; font-weight: 700;
    }
    .expand-bar-arrow {
      font-size: 10px; color: rgba(255,255,255,.7);
      transition: transform 0.2s;
    }
    .expand-bar.expanded .expand-bar-arrow {
      transform: rotate(180deg);
    }
    .expand-bar .expand-bar-collapsed { display: inline; }
    .expand-bar .expand-bar-expanded { display: none; }
    .expand-bar.expanded .expand-bar-collapsed { display: none; }
    .expand-bar.expanded .expand-bar-expanded { display: inline; }

    /* 可折叠容器 */
    .expandable-sections {
      display: grid; gap: 10px;
    }
    .expandable-sections.collapsed { display: none; }

    /* ============================================
       SECTION CARDS — 白色大圆角
       ============================================ */
    .section-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .section-card.muted-bg {
      background: #f6f7fa;
      border-color: #eaecf2;
      box-shadow: none;
    }
    .section-title {
      font-size: 15px; font-weight: 800; color: var(--ink);
      margin-bottom: 14px;
    }

    /* ===== Numbered items ===== */
    .num-item {
      display: flex; gap: 11px; align-items: flex-start;
    }
    .num-item + .num-item { margin-top: 18px; }
    .num-circle {
      flex: 0 0 22px; width: 22px; height: 22px; display: grid; place-items: center;
      background: #eef0f5; color: var(--text); border-radius: 50%;
      font-size: 12px; font-weight: 700; margin-top: 2px;
    }
    .num-body { min-width: 0; }
    .num-label {
      display: inline-block; font-size: 11px; font-weight: 700; color: #7a4e1f;
      background: #fff7ed; padding: 3px 8px; border-radius: 4px;
      margin-bottom: 4px;
    }
    .num-text {
      font-size: 13px; color: var(--text); line-height: 1.55; margin-top: 0;
    }

    /* ===== Response block: 回应 + 为什么管用 ===== */
    .response-block {
      margin-top: 10px;
      background: #f6f7fa;
      border-left: 1px solid #dde4f0;
      border-radius: 8px;
      padding: 12px 13px 10px;
    }
    .response-block .num-label {
      margin-bottom: 5px;
    }
    .response-block .why-line {
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid #e8ecf2;
      font-size: 12px; color: #596579; line-height: 1.55;
    }
    .why-line b { color: var(--ink); }

    /* ===== Practice CTA ===== */
    .practice-cta {
      margin-top: 16px; padding-top: 14px;
      border-top: 1px solid #e8ecf2;
    }
    .practice-cta-title {
      font-size: 14px; font-weight: 800; color: var(--ink);
      margin-bottom: 8px;
    }
    .practice-scene {
      padding: 12px 13px;
      background: #fff;
      border: 1px solid #e8ecf2;
      border-radius: 8px;
      font-size: 13px; color: var(--text); line-height: 1.55;
      margin-bottom: 10px;
    }
    .practice-scene-label {
      font-size: 10px; font-weight: 700; color: var(--muted);
      margin-bottom: 5px; letter-spacing: 0.03em;
    }
    .practice-btn {
      width: 100%; min-height: 44px;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      background: var(--accent); color: #fff; border-radius: 10px;
      font-size: 14px; font-weight: 700;
      box-shadow: 0 3px 12px rgba(194,65,12,.18);
      transition: background 0.15s, transform 0.12s;
    }
    .practice-btn:active { background: #b03a0b; transform: scale(.98); }

    /* Deep blue variant for practice queue */
    .practice-btn-blue {
      background: #0b234a;
      box-shadow: 0 3px 12px rgba(11,35,74,.25);
    }
    .practice-btn-blue:active { background: #081b38; }

    /* 练习覆盖层样式由 js/practice-overlay.js 统一注入 */

    /* ===== Responsive ===== */
    @media (max-width: 430px) {
      .stage { padding: 0; }
      .phone { width: 100vw; height: 100vh; height: 100dvh; min-height: 0; border: 0; border-radius: 0; box-shadow: none; }
    }

  </style>
</head>
<body>
  <main class="stage">
    <div class="phone" role="application" aria-label="销冠成交案例详情">

      <div class="scroll">

        <!-- ===== NAV ===== -->
        <nav class="detail-nav">
          <a class="detail-back" href="成交教练-phase1-v2.html" aria-label="返回销冠话术列表">‹</a>
          <h1 class="detail-nav-title" id="navTitle">销冠案例详情</h1>
        </nav>

        <!-- ===== BODY ===== -->
        <div class="detail-body" id="detailBody">
          <!-- Content rendered by JS -->
        </div>

      </div><!-- /scroll -->
    </div><!-- /phone -->
  </main>

  <!-- 练习覆盖层由 js/practice-overlay.js 统一注入 -->
  <script src="js/practice-overlay.js"></script>

  <script>
    (function () {
      'use strict';

      // ====== 案例数据 ======
      var CASES = {
        '1': {
          navTitle: '销冠小李案例分享',
          closeTime: '18 分钟',
          quickSteps: [
            { signal: '客户一直问空间、全程没问价格', move: '是不是经常带小朋友出门？' },
            { signal: '客户问后备厢多大', move: '婴儿车折起来立着放，旁边还能塞三袋超市的东西' },
            { signal: '客户说预算还是超了', move: '你担心的那些点，这车都解决了对吧？那你自己觉得，它值不值这个数？' }
          ],
          quickLearn: [
            '我发现客户同一个问题问两遍以上，不是真要数据，是我还没懂她的情况。这种时候我先反问，不抢答。',
            '客户问配置，不是关心那个数字，是在想能不能装下她的日子。能说成画面，我绝不多报一个数字。'
          ],
          steps: [
            {
              signal: '年轻女客户，聊的时候一直说孩子、老人、周末出去玩。全程没问价格，最在意空间够不够。',
              responseLabel: '小李怎么接',
              response: '姐，平时是不是经常带小朋友出门？',
              why: '我没问她预算多少、今天能不能定。她一直问空间，我就先从空间聊。这句反问一抛出去，她自己就把带娃出门的难处全说出来了，比我推销十句都管用。'
            },
            {
              signal: '客户主动问了两次后排和后备厢空间。',
              responseLabel: '小李怎么接',
              response: '儿童座椅装右边，左边坐两个大人。婴儿车折起来立着放，旁边还能塞三袋超市的东西。',
              why: '我知道她要的不是数字，是带孩子出门的那个画面。我把后备厢升数翻译成周末超市采购的样子，她脑子里有画面了，自己就知道这车合适——想象到了，就想要了。'
            },
            {
              signal: '她一直问空间，其实就是想知道——后排能不能装儿童座椅+坐人，后备厢能不能塞婴儿车。这些话没明说，但每次问的都是同一件事。',
              responseLabel: '小李怎么接',
              response: '姐，你担心的那些点，这车都解决了对吧？那你自己觉得，它值不值这个数？',
              why: '我没替她还价——替她还价等于替她做决定。我把前面帮她解决的顾虑全摆出来，让她自己判断值不值。她自己觉得值，比我降价一万都管用。'
            }
          ],
          practice: {
            scene: '「车我挺喜欢的，但价格还是有点超预算，我先回去再考虑一下。」'
          }
        },

        '2': {
          navTitle: '李晨 · 需求挖掘案例',
          closeTime: '22 分钟',
          quickSteps: [
            { signal: '客户说「随便看看」，逛一圈没在任何车前停', move: '平时自己开还是带家人多？' },
            { signal: '客户提到偶尔跑长途回老家', move: '那动力和高速稳不稳就很重要了。你之前那车跑高速感觉咋样？' },
            { signal: '客户对推荐点头但还在犹豫', move: '你刚才说跑长途、带家人，这几点都刚好对上。要不要试一下？' }
          ],
          quickLearn: [
            '我遇到说「随便看看」的客户，心里清楚他不是拒绝，是还没找到能聊起来的人。我先问一句家常，不急介绍配置。',
            '客户提到一个场景，不是在闲聊，是在告诉我他在意什么。我推荐车型跟着他自己说的需求走，不跟着参数表走。'
          ],
          steps: [
            {
              signal: '客户进店说「随便看看」，转了一圈哪辆车都没停下来看，也没说想看啥。',
              responseLabel: '李晨怎么接',
              response: '哥，平时主要是自己开还是带家人多？',
              why: '我不问「预算多少」、不问「看哪款」。就一句谁都能接的家常话，他自己就把用车场景说出来了。他说「带家人」，我就知道空间和舒适性是重点，后面全围着这俩聊。'
            },
            {
              signal: '客户提到偶尔要跑长途回老家。',
              responseLabel: '李晨怎么接',
              response: '那动力和高速稳不稳就很重要了。你之前那车跑高速感觉咋样？',
              why: '我从他自己的经历切入，让他自己说出旧车哪里不满意。痛点是他自己说出来的，比我分析一百句都有说服力。而且这句反问自然引出了「你需要一台高速更稳的车」。'
            },
            {
              signal: '客户对推荐车型点头但还在犹豫，没主动问价也没说去别家比。',
              responseLabel: '李晨怎么接',
              response: '哥，你刚才说跑长途、带家人，这三点 MG7 都刚好对上。你要不要试一下，感受一下高速上那个稳劲？',
              why: '我把前面他自己说的需求串起来——「跑长途」「带家人」全是他亲口说的。我推荐的不是最好的车，是最对的车。他感觉我懂他，后面推荐全接了，一个都没打回来。'
            }
          ],
          practice: {
            scene: '「我就随便看看，还没想好买什么车。」'
          }
        },

        '3': {
          navTitle: '阿强 · 逼单成交案例',
          closeTime: '30 分钟',
          quickSteps: [
            { signal: '客户说「考虑考虑」但人没走', move: '今天这个活动名额我先帮你占着，不想要了随时退，一分不少' },
            { signal: '客户开始认真算月供和首付', move: '这个优惠今天能锁，明天我不敢保证。你把方案发回去跟家里商量一下' },
            { signal: '客户在颜色上纠结卡住了', move: '你先定白色，提车的时候想换灰色也行。关键先把优惠锁住，颜色后面能改' }
          ],
          quickLearn: [
            '我观察到客户说考虑但人没走，不是不想买，是怕做错决定。所以我先给安全网（可退），不急着逼他。',
            '客户在小决定上卡住的时候，我帮他把大决策和小决策拆开——小决定给灵活性，大决策自然就过了。'
          ],
          steps: [
            {
              signal: '客户看了两圈，试驾完回来，嘴里说「再考虑考虑」，但人没走，还在店里转。',
              responseLabel: '阿强怎么接',
              response: '哥，定不定没关系。今天这个活动名额我先帮你占着，不想要了随时退，一分不少。',
              why: '客户说「考虑」的时候，最怕被逼着现在做决定。我反着来——先给退路。他没压力了，反而愿意坐下来认真跟我聊。这句「随时退」不是在让步，是在把他留下来。'
            },
            {
              signal: '客户开始认真算价格，问月供多少、首付多少。',
              responseLabel: '阿强怎么接',
              response: '这个优惠今天能锁，明天我不敢保证。但你现在不定也没关系，我把方案发你，你晚上跟家里商量一下。',
              why: '我制造了稀缺感，但没有逼迫感。「跟家里商量」让他觉得我站在他这边，不是只想成交。但「今天能锁明天不敢保证」已经在他脑子里种下了——他回去商量的时候会一直想这句话。'
            },
            {
              signal: '客户还在犹豫颜色，白色和灰色之间拿不定主意。',
              responseLabel: '阿强怎么接',
              response: '白色这周能提，灰色要多等两周。你先定白色，提车的时候想换灰色也行。关键是先把优惠锁住，颜色后面能改。',
              why: '我把大决策（买不买）拆成小决策（选颜色），再把小决策变成可逆的——颜色后面能改。他觉得「没什么损失」，当场就定了。我没逼他「现在就买」，给了他一个「现在定了也没风险」的理由。'
            }
          ],
          practice: {
            scene: '「车还不错，但我想再考虑考虑，不急这一两天。」'
          }
        }
      };

      // ====== 读取 URL 参数 ======
      var params = new URLSearchParams(window.location.search);
      var caseId = params.get('case') || '1';
      if (!CASES[caseId]) caseId = '1';

      var data = CASES[caseId];
      var CIRCLE_NUMS = ['①', '②', '③'];

      // ====== 渲染 ======
      document.getElementById('navTitle').textContent = data.navTitle;

      var html = '';

      // ===== 1 分钟速览 =====
      html += '<section class="quick-overview">';

      // 标题行
      html += '<div class="quick-header">';
      html += '<h2 class="quick-title">记住两点</h2>';
      html += '<span class="time-badge">到店 ' + data.closeTime + ' 成交</span>';
      html += '</div>';

      // 记住两点
      html += '<div class="quick-learn">';
      for (var j = 0; j < data.quickLearn.length; j++) {
        html += '<div class="quick-learn-item">';
        html += '<span class="quick-learn-num">' + (j + 1) + '</span>';
        html += '<span>' + data.quickLearn[j] + '</span>';
        html += '</div>';
      }
      html += '</div>';

      html += '</section>';

      // ===== 展开按钮 =====
      html += '<div class="expand-bar" id="expandBar" role="button" aria-expanded="false">';
      html += '<span class="expand-bar-collapsed">展开看销冠小李成交详解</span>';
      html += '<span class="expand-bar-expanded">收起完整拆解</span>';
